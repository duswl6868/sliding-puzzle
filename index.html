<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="theme-color" content="#F3F6FB" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Puzzle" />
<title>슬라이딩 퍼즐 - Glass</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon-v2.png" />
<link rel="icon" type="image/png" sizes="180x180" href="apple-touch-icon-v2.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<style>
  :root {
    --bg0: #f7f9fd;
    --bg1: #eef3fa;
    --ink: #1f314d;
    --ink-soft: #40516b;
    --muted: #7b899c;
    --faint: #a3afbf;
    --line: rgba(170, 184, 205, .28);
    --glass: rgba(255,255,255,.58);
    --glass-strong: rgba(255,255,255,.74);
    --glass-soft: rgba(255,255,255,.38);
    --empty: rgba(211, 224, 240, .58);
    --blue: #1877ff;
    --blue2: #4ba0ff;
    --blue-soft: rgba(24,119,255,.16);
    --blue-mid: rgba(24,119,255,.34);
    --radius-xl: 24px;
    --radius-lg: 20px;
    --radius-md: 16px;
    --ease: cubic-bezier(.22,.9,.2,1);
    --spring: cubic-bezier(.18,.78,.28,1.06);
    --slide-ms: 140ms;
    --slide-delay: 32ms;
    --font: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    position: fixed;
    inset: 0;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  html { background: var(--bg0); }
  body {
    color: var(--ink);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    background:
      radial-gradient(circle at 16% 10%, rgba(255,255,255,.98) 0 18%, transparent 42%),
      radial-gradient(circle at 84% 4%, rgba(255,255,255,.90) 0 14%, transparent 36%),
      radial-gradient(circle at 68% 86%, rgba(203,225,255,.44) 0 13%, transparent 38%),
      linear-gradient(145deg, #f8fbff 0%, #eef3fa 48%, #f7faff 100%);
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: .42;
    background-image:
      linear-gradient(rgba(255,255,255,.45) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.35) 1px, transparent 1px);
    background-size: 34px 34px;
    mask-image: radial-gradient(circle at 50% 30%, black, transparent 72%);
  }

  button { font: inherit; color: inherit; }
  .screen {
    width: 100%;
    max-width: 540px;
    min-height: 100vh;
    min-height: 100dvh;
    margin: 0 auto;
    padding: max(env(safe-area-inset-top), 18px) clamp(16px, 5vw, 24px) max(env(safe-area-inset-bottom), 18px);
    display: none;
    position: relative;
  }
  .screen.active {
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    touch-action: pan-y;
  }

  .statusbar {
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    color: #05070b;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -.02em;
  }
  .status-icons { display: flex; gap: 5px; align-items: center; }
  .signal { display:flex; gap:2px; align-items:flex-end; height:12px; }
  .signal span { width:3px; border-radius:2px; background:#05070b; display:block; }
  .signal span:nth-child(1){height:4px}.signal span:nth-child(2){height:6px}.signal span:nth-child(3){height:9px}.signal span:nth-child(4){height:11px}
  .wifi { width: 14px; height: 10px; position: relative; overflow: hidden; }
  .wifi::before { content:""; position:absolute; left:1px; top:0; width:12px; height:12px; border:2px solid #05070b; border-color:#05070b transparent transparent transparent; border-radius:50%; transform: rotate(45deg); }
  .battery { width: 20px; height: 10px; border: 2px solid #05070b; border-radius: 3px; position:relative; }
  .battery::before { content:""; position:absolute; right:-4px; top:2px; width:2px; height:4px; background:#05070b; border-radius:1px; }
  .battery::after { content:""; position:absolute; left:2px; top:2px; width:12px; height:2px; background:#05070b; border-radius:2px; }

  .topbar {
    height: 54px;
    display: grid;
    grid-template-columns: 48px 1fr 48px;
    align-items: center;
  }
  .topbar > .icon-btn:first-child  { justify-self: start; }
  .topbar > .icon-btn:last-child   { justify-self: end; }
  .icon-btn {
    width: 44px; height: 44px; border: 0; background: transparent; border-radius: 16px;
    display: grid; place-items: center; color: var(--ink); cursor: pointer;
    transition: transform 100ms ease, background 160ms ease;
  }
  .icon-btn:active { transform: scale(.92); }
  .icon-btn:hover { background: rgba(255,255,255,.48); }
  .icon-btn svg { width: 23px; height: 23px; overflow: visible; }
  .center-title { justify-self:center; display:flex; gap: 7px; align-items:center; font-size: clamp(18px, 5.4vw, 23px); font-weight: 800; letter-spacing: .04em; }
  .center-title button { border: 0; background: transparent; padding: 0; display:flex; align-items:center; gap:7px; cursor:pointer; }
  .center-title svg { width: 16px; height: 16px; opacity: .82; }

  .home-top { flex: 1; display: flex; flex-direction: column; justify-content: center; padding-bottom: 20px; }
  .hero { text-align: center; margin: clamp(18px, 4vw, 36px) 0 clamp(22px, 5vw, 40px); }
  .hero h1 { margin: 0 0 10px; font-size: clamp(24px, 7vw, 34px); line-height: 1.12; letter-spacing: -.045em; font-weight: 850; }
  .hero p { margin: 0; color: var(--ink-soft); font-size: clamp(13px, 3.8vw, 17px); font-weight: 500; letter-spacing: -.025em; }

  .glass-card {
    background: linear-gradient(145deg, rgba(255,255,255,.76), rgba(255,255,255,.42));
    border: 1px solid rgba(255,255,255,.72);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.92),
      inset 0 -1px 0 rgba(195,208,226,.18),
      0 16px 36px rgba(35,55,90,.09);
    backdrop-filter: blur(22px) saturate(150%);
    -webkit-backdrop-filter: blur(22px) saturate(150%);
  }
  .difficulty-list {
    display: flex;
    flex-direction: column;
    gap: clamp(10px, 2.5vw, 16px);
    padding: 0 2px;
  }
  .difficulty-card {
    min-height: clamp(88px, 22vw, 120px);
    width: 100%;
    border: 0;
    border-radius: 18px;
    padding: 0 clamp(18px, 5.5vw, 26px) 0 clamp(22px, 7vw, 34px);
    cursor: pointer;
    display: grid;
    grid-template-columns: minmax(0, 1fr) clamp(48px, 14vw, 78px) clamp(16px, 5vw, 22px);
    column-gap: 10px;
    align-items: center;
    text-align: left;
    background:
      radial-gradient(circle at 16% 10%, rgba(255,255,255,.96), rgba(255,255,255,.55) 42%, rgba(255,255,255,.48) 100%),
      linear-gradient(145deg, rgba(255,255,255,.82), rgba(255,255,255,.50));
    border: 1px solid rgba(255,255,255,.82);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.98),
      inset 0 -1px 0 rgba(178,194,217,.12),
      0 18px 42px rgba(38,58,92,.075),
      0 3px 10px rgba(38,58,92,.035);
    backdrop-filter: blur(24px) saturate(155%);
    -webkit-backdrop-filter: blur(24px) saturate(155%);
    transition: transform 130ms ease, box-shadow 180ms ease, background 180ms ease;
  }
  .difficulty-card:active { transform: scale(.985); }
  .difficulty-card .label {
    font-size: clamp(17px, 5vw, 23px);
    line-height: 1;
    font-weight: 850;
    letter-spacing: .025em;
    margin-bottom: clamp(8px, 2.6vw, 13px);
    color: #10223d;
  }
  .difficulty-card .sub {
    font-size: clamp(11px, 3.3vw, 15px);
    line-height: 1;
    color: #7f8da2;
    font-weight: 650;
    letter-spacing: -.02em;
  }
  .mini-grid {
    width: clamp(42px, 12vw, 55px);
    height: clamp(42px, 12vw, 55px);
    display: grid;
    gap: 4px;
    padding: 1px;
    justify-self: center;
    filter: drop-shadow(0 7px 12px rgba(60,92,140,.08));
  }
  .mini-grid.g3 { grid-template-columns: repeat(3, 1fr); }
  .mini-grid.g4 {
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
  }
  .mini-grid span {
    border-radius: 5px;
    background: linear-gradient(145deg, rgba(221,231,246,.82), rgba(198,216,239,.58));
    border: 1px solid rgba(255,255,255,.56);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.85),
      0 4px 9px rgba(77,104,144,.06);
  }
  .mini-grid span.hot {
    background: linear-gradient(180deg, #5ca8ff 0%, #1877ff 100%);
    border-color: rgba(255,255,255,.68);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.52),
      0 5px 12px rgba(24,119,255,.35),
      0 0 0 2px rgba(24,119,255,.08);
  }
  .chev {
    width: 22px;
    height: 22px;
    color: #7f8ea4;
    stroke-width: 2.35;
    justify-self: end;
  }
  .photo-thumb {
    width: clamp(42px, 12vw, 55px);
    height: clamp(42px, 12vw, 55px);
    display: grid;
    place-items: center;
    border-radius: 14px;
    justify-self: center;
    background: linear-gradient(180deg, #5ca8ff 0%, #1877ff 100%);
    border: 1px solid rgba(255,255,255,.68);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.52),
      0 8px 16px rgba(24,119,255,.34),
      0 0 0 2px rgba(24,119,255,.08);
    color: white;
    overflow: hidden;
    background-size: cover;
    background-position: center;
  }
  .photo-thumb svg { width: clamp(18px, 5.5vw, 24px); height: clamp(18px, 5.5vw, 24px); }
  .photo-thumb.has-image svg { display: none; }
  .infinity-thumb {
    width: clamp(42px, 12vw, 55px);
    height: clamp(42px, 12vw, 55px);
    display: grid;
    place-items: center;
    border-radius: 14px;
    justify-self: center;
    background: linear-gradient(180deg, #b69bff 0%, #6a45e7 100%);
    border: 1px solid rgba(255,255,255,.68);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.52),
      0 8px 16px rgba(106,69,231,.32),
      0 0 0 2px rgba(106,69,231,.08);
    color: white;
  }
  .infinity-thumb svg { width: clamp(24px, 8vw, 32px); height: clamp(16px, 5.4vw, 22px); }
  .home-stats { margin: clamp(20px, 6vw, 46px) 2px 0; border-radius: 20px; min-height: clamp(78px, 20vw, 104px); display:grid; grid-template-columns: repeat(3,1fr); overflow:hidden; }
  .home-stat { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; position:relative; padding: 8px 6px; }
  .home-stat + .home-stat::before { content:""; position:absolute; left:0; top:18%; bottom:18%; width:1px; background: var(--line); }
  .home-stat svg { width: clamp(18px, 4.5vw, 22px); height: clamp(18px, 4.5vw, 22px); color: #94a4ba; margin-bottom: 2px; }
  .home-stat .cap { font-size: clamp(11px, 3.2vw, 14px); color: #7f8fa5; font-weight: 600; }
  .home-stat .val { font-size: clamp(16px, 4.8vw, 20px); font-weight: 850; letter-spacing: -.02em; }

  .play-layout { flex: 1; display:flex; flex-direction:column; }
  .stats-row { margin: clamp(24px, 7vw, 42px) clamp(14px, 5vw, 26px) clamp(20px, 6vw, 32px); display:grid; grid-template-columns: 1fr 1px 1fr; align-items:center; }
  .divider { height: clamp(34px, 9vw, 46px); background: var(--line); }
  .stat { padding-left: 0; }
  .stat.right { text-align:center; }
  .stat .cap { color: var(--muted); font-size: clamp(11px, 3.2vw, 14px); font-weight: 600; margin-bottom: 7px; }
  .stat .num { font-size: clamp(16px, 5vw, 22px); font-weight: 850; font-variant-numeric: tabular-nums; letter-spacing: -.015em; }

  .board-wrap { width:100%; padding: 0 2px; }
  .board {
    width: 100%; aspect-ratio: 1/1; position: relative; border-radius: 20px;
    background: linear-gradient(145deg, rgba(235,242,251,.56), rgba(255,255,255,.34));
    border: 1px solid rgba(255,255,255,.78);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.9),
      inset 0 -1px 0 rgba(135,159,191,.18),
      0 18px 38px rgba(38,58,92,.10),
      0 2px 8px rgba(38,58,92,.05);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    overflow: hidden;
  }
  .board::after { content:""; position:absolute; inset:0; pointer-events:none; border-radius:inherit; box-shadow: inset 0 0 30px rgba(255,255,255,.30); }
  .tile {
    position: absolute; border: 0; padding: 0; border-radius: 10px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font); font-weight: 780; color: #34465f; font-variant-numeric: tabular-nums;
    background: linear-gradient(145deg, rgba(255,255,255,.70), rgba(255,255,255,.46));
    border: 1px solid rgba(255,255,255,.78);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.95),
      inset 0 -1px 0 rgba(164,184,209,.18),
      0 2px 5px rgba(35,55,86,.12),
      0 0 18px rgba(110,160,220,.16);
    backdrop-filter: blur(18px) saturate(150%);
    -webkit-backdrop-filter: blur(18px) saturate(150%);
    transition:
      transform var(--slide-ms) linear,
      background 260ms ease,
      box-shadow 260ms ease,
      color 260ms ease,
      opacity 200ms ease;
    will-change: transform;
    touch-action: none;
    overflow: hidden;
    isolation: isolate;
  }
  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(180deg, rgba(255,255,255,.45) 0%, rgba(255,255,255,.10) 32%, rgba(255,255,255,0) 58%);
    pointer-events: none;
    z-index: 0;
  }
  .tile .num {
    position: relative;
    z-index: 1;
  }
  .tile.img::before { display: none; }
  .tile:active { transform: var(--pos) scale(.965); transition-duration: 80ms; transition-delay: 0ms; }
  .tile.img {
    color: transparent;
    background-color: transparent;
    background-repeat: no-repeat;
  }
  .tile.img .img-num {
    position: absolute;
    top: 4px;
    right: 7px;
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,.85);
    text-shadow: 0 1px 2px rgba(0,0,0,.45);
    pointer-events: none;
  }
  .tile.hint {
    color: var(--blue);
    background: linear-gradient(145deg, rgba(230,242,255,.88), rgba(184,215,255,.48));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.96),
      0 0 0 1px rgba(24,119,255,.18),
      0 0 0 5px rgba(24,119,255,.10),
      0 13px 26px rgba(24,119,255,.24);
  }
  .tile.complete { color: #2d415c; background: linear-gradient(145deg, rgba(255,255,255,.76), rgba(255,255,255,.48)); }

  .toolbar { margin-top: auto; padding: 48px 6px 8px; display:grid; grid-template-columns: repeat(3, 1fr); gap: 28px; align-items:end; }
  .tool-btn {
    justify-self:center; width:70px; min-height:70px; border:0; border-radius:15px; cursor:pointer; position:relative;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px;
    color: var(--ink); font-size: 11px; font-weight: 650;
    transition: transform 100ms ease, filter 160ms ease, opacity 160ms ease;
  }
  .tool-btn svg { width: 24px; height: 24px; }
  .tool-btn:active { transform: scale(.94); }
  .tool-btn:disabled { opacity: .38; cursor:default; }
  .badge { position:absolute; right:-5px; top:-7px; min-width:21px; height:21px; padding:0 6px; border-radius:999px; display:grid; place-items:center; background: var(--blue); color:white; font-size:12px; font-weight:850; box-shadow:0 6px 14px rgba(24,119,255,.30); }

  .win-head { text-align:center; padding: 56px 0 28px; position:relative; }
  .win-head h2 { margin:0 0 12px; color: var(--blue); font-size: clamp(22px, 7vw, 30px); font-weight:900; letter-spacing:-.02em; }
  .win-head p { margin:0; font-size: clamp(15px, 4.6vw, 20px); font-weight:850; color:#1f314d; }
  .win-head p span { color:#93a0b2; padding: 0 12px; }
  .win-actions { padding: 44px 2px 0; display:flex; flex-direction:column; gap:22px; }
  .primary-cta { height: clamp(50px, 14vw, 60px); border:0; border-radius: 12px; cursor:pointer; color:#fff; font-size: clamp(15px, 4.5vw, 18px); font-weight:800; background: linear-gradient(180deg, #2b91ff 0%, #1170f6 100%); box-shadow: 0 16px 28px rgba(24,119,255,.28), inset 0 1px 0 rgba(255,255,255,.34); }
  .secondary-cta {
    height: clamp(50px, 14vw, 60px); border: 1px solid rgba(255,255,255,.85); border-radius: 12px; cursor: pointer;
    color: var(--ink); font-size: clamp(15px, 4.5vw, 18px); font-weight: 800;
    background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.60));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.95), 0 10px 22px rgba(38,58,92,.10);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
  }
  .link-btn { border:0; background:transparent; color:#718098; font-size:15px; font-weight:700; cursor:pointer; }
  .confetti { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .confetti i { position:absolute; width:7px; height:11px; border-radius:2px; background: var(--blue); opacity:.55; animation: fall 1.8s var(--ease) both; }
  @keyframes fall { from { transform: translateY(-20px) rotate(0deg); opacity:0; } 12% { opacity:.75; } to { transform: translateY(160px) rotate(230deg); opacity:0; } }

  .tool-btn.pop, .secondary-cta.pop { animation: soft-pop 360ms var(--ease) both; }
  @keyframes soft-pop { from { transform: scale(.965); } 55% { transform: scale(1.018); } to { transform: scale(1); } }

  .tile.spawn { animation: tile-spawn 460ms var(--ease) both; }
  @keyframes tile-spawn {
    from { opacity:0; transform: var(--pos) scale(.86); filter: blur(2px); }
    60%  { opacity:1; transform: var(--pos) scale(1.035); filter: blur(0); }
    to   { opacity:1; transform: var(--pos) scale(1); }
  }

  /* Hint pulse — slow blink */
  .tile.hint { animation: hint-pulse 1.4s ease-in-out infinite; }
  @keyframes hint-pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.55; }
  }

  .home-indicator { position: fixed; left:50%; bottom: max(7px, env(safe-area-inset-bottom)); width: 138px; height:5px; transform:translateX(-50%); border-radius: 999px; background: #111827; opacity:.32; pointer-events:none; }

  @media (max-width: 380px) {
    .screen { padding-left: 18px; padding-right: 18px; }
    .hero { margin-top: 34px; margin-bottom: 44px; }
    .hero h1 { font-size: 27px; }
    .toolbar { gap: 18px; }
    .tool-btn { width:64px; min-height:64px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .tile, .tool-btn, .icon-btn, .difficulty-card { transition-duration: 0ms !important; }
    .confetti i, .tool-btn.pop, .secondary-cta.pop, .tile.spawn, .tile.hint { animation: none !important; }
  }
</style>
</head>
<body>
  <main class="screen active" id="homeScreen">

    <div class="topbar">
      <span></span><span></span>
      <button class="icon-btn" id="settingsBtn" aria-label="설정"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
    </div>
    <section class="home-top">
      <div class="hero"><h1>슬라이딩 퍼즐</h1><p>집중하고, 정렬하고, 완성하세요.</p></div>
      <div class="difficulty-list">
        <button class="difficulty-card glass-card" data-size="3"><div><div class="label">3 × 3</div><div class="sub">8 퍼즐</div></div><div class="mini-grid g3"><span></span><span></span><span></span><span></span><span class="hot"></span><span></span><span></span><span></span><span></span></div><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
        <button class="difficulty-card glass-card" data-size="4"><div><div class="label">4 × 4</div><div class="sub">15 퍼즐</div></div><div class="mini-grid g4"><span></span><span></span><span></span><span></span><span></span><span class="hot"></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
        <button class="difficulty-card glass-card" id="infiniteCard"><div><div class="label">무한의 퍼즐</div><div class="sub">3×3부터 끝없이 도전</div></div><div class="infinity-thumb"><svg viewBox="0 0 32 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4c5.5 0 5.5 16 0 16-6 0-9-16-15-16-4.5 0-4.5 16 0 16 6 0 9-16 15-16z"/></svg></div><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
        <button class="difficulty-card glass-card" id="photoCard"><div><div class="label">내 사진 퍼즐</div><div class="sub">사진을 골라 직접 만들기</div></div><div class="photo-thumb" id="photoThumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 5h-5L7.5 7.5H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-2.5L14.5 5z"/><circle cx="12" cy="13" r="3.2"/></svg></div><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
      <input type="file" id="photoInput" accept="image/*" style="display:none" />
      <div class="home-stats glass-card">
        <div class="home-stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 20V10"/><path d="M10 20V5"/><path d="M15 20v-8"/><path d="M20 20V8"/></svg><div class="cap">오늘 플레이</div><div class="val" id="todayCount">0</div></div>
        <div class="home-stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v6l4 2"/></svg><div class="cap">최고 기록</div><div class="val" id="bestTime">--:--</div></div>
        <div class="home-stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v4a5 5 0 0 1-10 0V4Z"/><path d="M17 5h3v2a3 3 0 0 1-3 3"/><path d="M7 5H4v2a3 3 0 0 0 3 3"/></svg><div class="cap">완료</div><div class="val" id="completeCount">0</div></div>
      </div>
    </section>
  </main>

  <main class="screen" id="playScreen">

    <div class="topbar">
      <button class="icon-btn" id="backBtn" aria-label="뒤로"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="center-title"><button id="sizeCycle" aria-label="난이도 변경"><span id="diffLabel">3 × 3</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></button></div>
      <button class="icon-btn" id="newGame" aria-label="다시 셔플"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
    </div>
    <section class="play-layout">
      <div class="stats-row"><div class="stat"><div class="cap">시간</div><div class="num" id="time">00:00</div></div><div class="divider"></div><div class="stat right"><div class="cap">이동</div><div class="num" id="moves">0</div></div></div>
      <div class="board-wrap"><div class="board" id="board" role="application" aria-label="슬라이딩 퍼즐"></div></div>
      <div class="toolbar">
        <button class="tool-btn glass-card" id="undoBtn" aria-label="되돌리기" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg><span>되돌리기</span></button>
        <button class="tool-btn glass-card" id="hintBtn" aria-label="힌트"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.09 14A6 6 0 1 0 8.91 14"/><path d="M12 2v1"/></svg><span>힌트</span><b class="badge" id="hintBadge">3</b></button>
        <button class="tool-btn glass-card" id="shuffleBtn" aria-label="섞기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg><span>섞기</span></button>
      </div>
    </section>
  </main>

  <main class="screen" id="winScreen">

    <div class="confetti" id="confetti"></div>
    <section class="win-head"><h2>완성!</h2><p><b id="winTime">00:00</b><span>|</span><b id="winMoves">0 이동</b></p></section>
    <div class="board-wrap"><div class="board" id="winBoard" aria-hidden="true"></div></div>
    <div class="win-actions"><button class="primary-cta" id="againBtn">다시 플레이</button><button class="secondary-cta" id="retryBtn" style="display:none">다시하기</button><button class="link-btn" id="homeBtn">메인으로</button></div>
  </main>

<script>
(() => {
  'use strict';

  // Block iOS pinch-zoom (viewport meta alone is ignored by modern iOS Safari).
  ['gesturestart', 'gesturechange', 'gestureend'].forEach(t =>
    document.addEventListener(t, (e) => e.preventDefault(), { passive: false })
  );
  // Cut multi-touch at touchstart so pinch never starts (anywhere on the page)
  document.addEventListener('touchstart', (e) => {
    if (e.touches && e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', (e) => {
    if (e.touches && e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  // Block double-tap zoom on non-interactive areas only.
  // Skip when target is a button (tile / toolbar / card) so rapid taps still fire click events.
  let lastTouchEnd = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    const onButton = e.target && typeof e.target.closest === 'function' && e.target.closest('button');
    if (!onButton && now - lastTouchEnd < 450) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });

  const LS_KEY = 'sliding_puzzle_glass_v1';
  const SIZES = [3, 4];
  const GAP = 4;

  let size = 3;
  let tiles = [];
  let order = new Map();
  let emptyPos = 0;
  let moves = 0;
  let startTs = null;
  let timerHandle = null;
  let won = false;
  let lockInput = false;
  let history = [];
  let hints = 3;
  let imageMode = false;
  let currentImage = null;
  let infiniteMode = false;

  const $ = (id) => document.getElementById(id);
  const homeScreen = $('homeScreen');
  const playScreen = $('playScreen');
  const winScreen = $('winScreen');
  const boardEl = $('board');
  const winBoardEl = $('winBoard');
  const timeEl = $('time');
  const movesEl = $('moves');
  const diffLabel = $('diffLabel');
  const undoBtn = $('undoBtn');
  const hintBtn = $('hintBtn');
  const hintBadge = $('hintBadge');

  function todayKey() { return new Date().toISOString().slice(0,10); }
  function defaultStore() { return { v:1, lastSize:3, best:{}, today:{ date: todayKey(), plays: 0 }, completed: 0 }; }
  function loadLS() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      const obj = raw ? JSON.parse(raw) : defaultStore();
      if (!obj || obj.v !== 1) return defaultStore();
      if (!obj.today || obj.today.date !== todayKey()) obj.today = { date: todayKey(), plays: 0 };
      return obj;
    } catch { return defaultStore(); }
  }
  function saveLS(s) { try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch {} }
  function mutateLS(fn) { const s = loadLS(); fn(s); saveLS(s); renderHomeStats(); }
  function bestKey() { return String(size); }
  function setBestIfBetter(timeMs, moveCount) {
    let isNew = false;
    mutateLS(s => {
      const k = bestKey();
      const prev = s.best[k];
      if (!prev || timeMs < prev.timeMs) { s.best[k] = { timeMs, moves: moveCount }; isNew = true; }
      s.completed = (s.completed || 0) + 1;
      s.lastSize = size;
    });
    return isNew;
  }
  function rememberSize() { mutateLS(s => { s.lastSize = size; }); }
  function countPlay() { mutateLS(s => { s.today.plays = (s.today.plays || 0) + 1; }); }

  function fmtTime(ms) {
    const sec = Math.floor(ms / 1000);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }
  function renderHomeStats() {
    const s = loadLS();
    $('todayCount').textContent = String(s.today?.plays || 0);
    $('completeCount').textContent = String(s.completed || 0);
    const best = s.best?.[String(s.lastSize || size)] || s.best?.[String(size)];
    $('bestTime').textContent = best ? fmtTime(best.timeMs) : '--:--';
  }

  function show(screen) {
    [homeScreen, playScreen, winScreen].forEach(el => el.classList.remove('active'));
    screen.classList.add('active');
    requestAnimationFrame(() => {
      sizeFonts();
      layout(false);
      if (screen === winScreen) layoutSolved(winBoardEl);
    });
  }
  function updateDiffLabel() { diffLabel.textContent = `${size} × ${size}`; }
  function posToRC(pos) { return { row: Math.floor(pos / size), col: pos % size }; }
  function rcToPos(row, col) { return row * size + col; }
  function tileSize(board = boardEl) { const boardPx = board.clientWidth; return (boardPx - GAP * (size + 1)) / size; }
  function tilePos(row, col, board = boardEl) { const ts = tileSize(board); return { x: GAP + col * (ts + GAP), y: GAP + row * (ts + GAP), ts }; }

  function buildTiles(target = boardEl, solved = false) {
    target.innerHTML = '';
    if (!solved) { tiles = []; order = new Map(); history = []; won = false; updateUndo(); }
    const N = size * size;
    for (let i = 0; i < N - 1; i++) {
      const val = i + 1;
      const row = Math.floor(i / size);
      const col = i % size;
      if (!solved) { tiles[i] = val; order.set(val, { row, col }); }
      const el = document.createElement('button');
      el.className = 'tile';
      el.dataset.value = String(val);
      el.setAttribute('aria-label', `타일 ${val}`);
      if (imageMode && currentImage) {
        el.classList.add('img');
        el.style.backgroundImage = `url("${currentImage}")`;
        const numEl = document.createElement('span');
        numEl.className = 'img-num';
        numEl.textContent = String(val);
        el.appendChild(numEl);
      } else {
        const numEl = document.createElement('span');
        numEl.className = 'num';
        numEl.textContent = String(val);
        el.appendChild(numEl);
      }
      if (!solved) el.addEventListener('click', () => tryTapTile(val));
      target.appendChild(el);
    }
    if (!solved) { tiles[N - 1] = 0; emptyPos = N - 1; layout(false); sizeFonts(); }
    else layoutSolved(target);
  }
  function sizeFonts() {
    [boardEl, winBoardEl].forEach(board => {
      if (!board || !board.clientWidth) return;
      const ts = tileSize(board);
      const fs = Math.max(24, ts * 0.36);
      board.querySelectorAll('.tile').forEach(el => { el.style.fontSize = `${fs}px`; });
    });
  }
  function applyImageBg(el, board, val) {
    if (!(imageMode && currentImage)) return;
    const ts = tileSize(board);
    const boardW = board.clientWidth;
    const targetRow = Math.floor((val - 1) / size);
    const targetCol = (val - 1) % size;
    const x = GAP + targetCol * (ts + GAP);
    const y = GAP + targetRow * (ts + GAP);
    el.style.backgroundSize = `${boardW}px ${boardW}px`;
    el.style.backgroundPosition = `-${x}px -${y}px`;
  }
  function layout(animate = true) {
    if (!boardEl.clientWidth) return;
    const ts = tileSize(boardEl);
    for (const val of order.keys()) {
      const rc = order.get(val);
      const { x, y } = tilePos(rc.row, rc.col, boardEl);
      const el = boardEl.querySelector(`.tile[data-value="${val}"]`);
      if (!el) continue;
      el.style.width = `${ts}px`;
      el.style.height = `${ts}px`;
      el.style.setProperty('--pos', `translate(${x}px, ${y}px)`);
      el.style.transform = `translate(${x}px, ${y}px)`;
      applyImageBg(el, boardEl, val);
    }
    if (!animate) disableTransitionsOnce(boardEl);
  }
  function layoutSolved(target) {
    if (!target.clientWidth) return;
    const ts = tileSize(target);
    target.querySelectorAll('.tile').forEach(el => {
      const val = Number(el.dataset.value);
      const pos = val - 1;
      const { row, col } = posToRC(pos);
      const { x, y } = tilePos(row, col, target);
      el.style.width = `${ts}px`;
      el.style.height = `${ts}px`;
      el.style.setProperty('--pos', `translate(${x}px, ${y}px)`);
      el.style.transform = `translate(${x}px, ${y}px)`;
      el.classList.add('complete');
      applyImageBg(el, target, val);
    });
    disableTransitionsOnce(target);
  }
  function disableTransitionsOnce(root) {
    root.querySelectorAll('.tile').forEach(el => { el.style.transition = 'none'; el.offsetHeight; el.style.transition = ''; });
  }

  function neighborsOf(pos) {
    const { row, col } = posToRC(pos);
    const out = [];
    if (row > 0) out.push(rcToPos(row - 1, col));
    if (row < size - 1) out.push(rcToPos(row + 1, col));
    if (col > 0) out.push(rcToPos(row, col - 1));
    if (col < size - 1) out.push(rcToPos(row, col + 1));
    return out;
  }
  function isAdjacentToEmpty(pos) { return neighborsOf(emptyPos).includes(pos); }
  function findPosOfValue(val) { return tiles.indexOf(val); }
  function applyMove(tilePos_) {
    const val = tiles[tilePos_];
    tiles[emptyPos] = val;
    tiles[tilePos_] = 0;
    const newRC = posToRC(emptyPos);
    emptyPos = tilePos_;
    order.set(val, newRC);
  }
  function tryTapTile(val) {
    if (lockInput || won) return;
    const pos = findPosOfValue(val);
    if (!isAdjacentToEmpty(pos)) return;
    doMove(pos, true);
  }
  function doMove(pos, pushHistory) {
    const wasEmpty = emptyPos;
    applyMove(pos);
    if (pushHistory) { history.push({ tileTo: wasEmpty, emptyTo: pos }); updateUndo(); }
    if (startTs === null) startTimer();
    moves++;
    movesEl.textContent = moves;
    layout(true);
    clearHints();
    if (isSolved()) onSolved();
  }
  function tryMoveByDirection(dir) {
    if (lockInput || won) return;
    const { row, col } = posToRC(emptyPos);
    let target = -1;
    if (dir === 'up' && row < size - 1) target = rcToPos(row + 1, col);
    if (dir === 'down' && row > 0) target = rcToPos(row - 1, col);
    if (dir === 'left' && col < size - 1) target = rcToPos(row, col + 1);
    if (dir === 'right' && col > 0) target = rcToPos(row, col - 1);
    if (target >= 0) doMove(target, true);
  }
  function undo() {
    if (lockInput || won || !history.length) return;
    const last = history.pop();
    applyMove(last.tileTo);
    moves = Math.max(0, moves - 1);
    movesEl.textContent = moves;
    layout(true);
    updateUndo();
  }
  function updateUndo() { undoBtn.disabled = history.length === 0 || won; }
  function isSolved() {
    const N = size * size;
    for (let i = 0; i < N - 1; i++) if (tiles[i] !== i + 1) return false;
    return true;
  }

  async function shuffle(startPlay = true) {
    lockInput = true;
    stopTimer();
    buildTiles();
    moves = 0; movesEl.textContent = '0';
    startTs = null; timeEl.textContent = '00:00';
    won = false; hints = 3; hintBadge.textContent = hints; clearHints();
    const steps = Math.max(70, size * size * 10);
    let prevPos = -1;
    for (let i = 0; i < steps; i++) {
      const neigh = neighborsOf(emptyPos).filter(p => p !== prevPos);
      const pick = neigh[Math.floor(Math.random() * neigh.length)];
      prevPos = emptyPos;
      applyMove(pick);
    }
    if (isSolved()) applyMove(neighborsOf(emptyPos)[0]);
    layout(false); history = []; updateUndo();
    spawnTiles();
    if (startPlay) countPlay();
    await sleep(60);
    lockInput = false;
  }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  function startTimer() { startTs = performance.now(); timerHandle = setInterval(tickTimer, 200); }
  function stopTimer() { if (timerHandle) { clearInterval(timerHandle); timerHandle = null; } }
  function tickTimer() { if (startTs !== null) timeEl.textContent = fmtTime(performance.now() - startTs); }
  function elapsedMs() { return startTs === null ? 0 : performance.now() - startTs; }

  function clearHints() { boardEl.querySelectorAll('.tile.hint').forEach(el => el.classList.remove('hint')); }
  function showHint() {
    if (lockInput || won || hints <= 0) return;
    clearHints();
    const candidates = neighborsOf(emptyPos).map(p => ({ p, val: tiles[p] })).filter(x => x.val > 0);
    if (!candidates.length) return;
    candidates.sort((a, b) => manhattanAfterMove(a.p) - manhattanAfterMove(b.p));
    const val = candidates[0].val;
    const el = boardEl.querySelector(`.tile[data-value="${val}"]`);
    if (el) el.classList.add('hint');
    hints--; hintBadge.textContent = hints;
  }
  function manhattanAfterMove(pos) {
    const copy = tiles.slice();
    copy[emptyPos] = copy[pos]; copy[pos] = 0;
    let sum = 0;
    for (let i = 0; i < copy.length; i++) {
      const val = copy[i]; if (!val) continue;
      const goal = val - 1;
      const a = posToRC(i), b = posToRC(goal);
      sum += Math.abs(a.row - b.row) + Math.abs(a.col - b.col);
    }
    return sum;
  }

  function pulse(el, cls = 'pop') {
    if (!el) return;
    el.classList.remove(cls);
    void el.offsetWidth;
    el.classList.add(cls);
  }
  function spawnTiles() {
    boardEl.querySelectorAll('.tile').forEach((el, i) => {
      el.classList.remove('spawn');
      const delay = Math.min(i * 18, 180);
      el.style.animationDelay = `${delay}ms`;
      void el.offsetWidth;
      el.classList.add('spawn');
      // Remove .spawn after animation finishes so its fill-mode doesn't lock the
      // transform value (which would block subsequent CSS transitions on user moves).
      setTimeout(() => {
        el.classList.remove('spawn');
        el.style.animationDelay = '';
      }, 460 + delay + 40);
    });
  }
  function configureWinActions() {
    const again = $('againBtn');
    const retry = $('retryBtn');
    const home = $('homeBtn');
    if (infiniteMode) {
      again.textContent = `다음 (${size + 1} × ${size + 1})`;
      retry.style.display = '';
      home.textContent = '홈';
    } else {
      again.textContent = '다시 플레이';
      retry.style.display = 'none';
      home.textContent = '메인으로';
    }
  }
  function alignWinBoardToPlay() {
    if (!boardEl.clientWidth) return;
    const playBoardTop = boardEl.getBoundingClientRect().top;
    const winScreenEl = $('winScreen');
    const screenPadTop = parseFloat(getComputedStyle(winScreenEl).paddingTop) || 0;
    const winHead = winScreenEl.querySelector('.win-head');
    if (!winHead) return;
    const headHeight = Math.max(0, playBoardTop - screenPadTop);
    winHead.style.height = `${headHeight}px`;
    winHead.style.padding = '0';
    winHead.style.display = 'flex';
    winHead.style.flexDirection = 'column';
    winHead.style.alignItems = 'center';
    winHead.style.justifyContent = 'center';
  }
  function onSolved() {
    won = true; lockInput = true; updateUndo(); stopTimer();
    const total = Math.round(elapsedMs());
    timeEl.textContent = fmtTime(total);
    setBestIfBetter(total, moves);
    boardEl.querySelectorAll('.tile').forEach(el => el.classList.add('complete'));
    $('winTime').textContent = fmtTime(total);
    $('winMoves').textContent = `${moves} 이동`;
    configureWinActions();
    alignWinBoardToPlay();
    setTimeout(() => {
      buildTiles(winBoardEl, true);
      sizeFonts(); layoutSolved(winBoardEl);
      makeConfetti();
      show(winScreen);

      // Image mode reveal: place the full photo on the board, then fade tiles out
      // so the 9 slices vanish and a seamless picture remains.
      if (imageMode && currentImage) {
        winBoardEl.style.backgroundImage = `url("${currentImage}")`;
        winBoardEl.style.backgroundSize = 'cover';
        winBoardEl.style.backgroundPosition = 'center';
        requestAnimationFrame(() => requestAnimationFrame(() => {
          winBoardEl.querySelectorAll('.tile').forEach(tile => {
            tile.style.transition = 'opacity 700ms ease-out 250ms';
            tile.style.opacity = '0';
          });
        }));
      } else {
        winBoardEl.style.backgroundImage = '';
        winBoardEl.style.backgroundSize = '';
        winBoardEl.style.backgroundPosition = '';
      }

      lockInput = false;
    }, 300);
  }
  function makeConfetti() {
    const c = $('confetti'); c.innerHTML = '';
    for (let i = 0; i < 28; i++) {
      const n = document.createElement('i');
      n.style.left = `${8 + Math.random() * 84}%`;
      n.style.top = `${-10 + Math.random() * 20}px`;
      n.style.animationDelay = `${Math.random() * .55}s`;
      n.style.transform = `rotate(${Math.random()*180}deg)`;
      n.style.background = Math.random() > .45 ? '#1877ff' : '#8bbdff';
      c.appendChild(n);
    }
  }

  function startGame(newSize = size) {
    size = newSize;
    rememberSize();
    updateDiffLabel();
    show(playScreen);
    shuffle(true);
  }
  document.querySelectorAll('.difficulty-card[data-size]').forEach(btn => btn.addEventListener('click', () => {
    imageMode = false;
    currentImage = null;
    infiniteMode = false;
    startGame(Number(btn.dataset.size));
  }));
  $('infiniteCard').addEventListener('click', () => {
    imageMode = false;
    currentImage = null;
    infiniteMode = true;
    startGame(3);
  });
  $('photoCard').addEventListener('click', () => $('photoInput').click());
  function cropToSquare(srcDataUrl, cb) {
    const img = new Image();
    img.onload = () => {
      const side = Math.min(img.width, img.height);
      const sx = (img.width - side) / 2;
      const sy = (img.height - side) / 2;
      const outSide = Math.min(side, 1024);
      const canvas = document.createElement('canvas');
      canvas.width = outSide;
      canvas.height = outSide;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, outSide, outSide);
      ctx.drawImage(img, sx, sy, side, side, 0, 0, outSide, outSide);
      cb(canvas.toDataURL('image/jpeg', 0.92));
    };
    img.onerror = () => cb(null);
    img.src = srcDataUrl;
  }
  $('photoInput').addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      cropToSquare(ev.target.result, (squared) => {
        if (!squared) { alert('이미지를 불러올 수 없습니다.'); return; }
        currentImage = squared;
        imageMode = true;
        const thumb = $('photoThumb');
        if (thumb) {
          thumb.classList.add('has-image');
          thumb.style.backgroundImage = `url("${currentImage}")`;
        }
        startGame(size);
      });
    };
    reader.onerror = () => {
      currentImage = null;
      imageMode = false;
      alert('이미지를 불러올 수 없습니다.');
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  });
  function goHome() {
    infiniteMode = false;
    stopTimer();
    show(homeScreen);
    renderHomeStats();
  }
  $('backBtn').addEventListener('click', goHome);

  // iOS-style edge swipe from left to right → back to home
  let edgeSwipe = null;
  playScreen.addEventListener('pointerdown', (e) => {
    if (e.pointerType !== 'touch') return;
    if (e.clientX < 28) edgeSwipe = { x: e.clientX, y: e.clientY, t: Date.now() };
  });
  playScreen.addEventListener('pointerup', (e) => {
    if (e.pointerType !== 'touch' || !edgeSwipe) return;
    const dx = e.clientX - edgeSwipe.x;
    const dy = Math.abs(e.clientY - edgeSwipe.y);
    const dt = Date.now() - edgeSwipe.t;
    edgeSwipe = null;
    if (dx > 80 && dy < 60 && dt < 800) goHome();
  });
  playScreen.addEventListener('pointercancel', () => { edgeSwipe = null; });
  $('newGame').addEventListener('click', () => shuffle(true));
  $('shuffleBtn').addEventListener('click', () => { pulse($('shuffleBtn')); shuffle(true); });
  undoBtn.addEventListener('click', () => { pulse(undoBtn); undo(); });
  hintBtn.addEventListener('click', () => { pulse(hintBtn); showHint(); });
  $('againBtn').addEventListener('click', () => {
    if (infiniteMode) {
      size = size + 1;
      rememberSize();
      updateDiffLabel();
      show(playScreen);
      shuffle(true);
    } else {
      show(playScreen);
      shuffle(true);
    }
  });
  $('retryBtn').addEventListener('click', () => { pulse($('retryBtn')); show(playScreen); shuffle(true); });
  $('homeBtn').addEventListener('click', () => { infiniteMode = false; show(homeScreen); renderHomeStats(); });
  $('sizeCycle').addEventListener('click', () => {
    if (infiniteMode) return;
    size = size === 3 ? 4 : 3; updateDiffLabel(); shuffle(true);
  });
  $('settingsBtn').addEventListener('click', () => alert('설정은 다음 버전에서 연결하면 됩니다.'));

  document.addEventListener('keydown', (e) => {
    if (!playScreen.classList.contains('active')) return;
    const map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
    if (map[e.key]) { e.preventDefault(); tryMoveByDirection(map[e.key]); }
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); }
  });
  let touchStart = null;
  boardEl.addEventListener('pointerdown', (e) => { if (e.pointerType === 'touch') touchStart = { x: e.clientX, y: e.clientY }; });
  boardEl.addEventListener('pointerup', (e) => {
    if (e.pointerType !== 'touch' || !touchStart) return;
    const dx = e.clientX - touchStart.x, dy = e.clientY - touchStart.y;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) >= 24) tryMoveByDirection(ax > ay ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
    touchStart = null;
  });
  let resizeRaf = null;
  window.addEventListener('resize', () => {
    if (resizeRaf) cancelAnimationFrame(resizeRaf);
    resizeRaf = requestAnimationFrame(() => { sizeFonts(); layout(false); layoutSolved(winBoardEl); });
  });
  function init() {
    const s = loadLS();
    size = SIZES.includes(s.lastSize) ? s.lastSize : 3;
    updateDiffLabel();
    renderHomeStats();
  }
  window.addEventListener('load', init);
})();
</script>
</body>
</html>
