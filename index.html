<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="theme-color" content="#F3F6FB" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Puzzle" />
<title>슬라이딩 퍼즐 - Glass</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon-v8.png" />
<link rel="icon" type="image/png" sizes="180x180" href="apple-touch-icon-v8.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512-v8.png" />
<style>
  :root {
    --bg0: #f7f9fd;
    --bg1: #eef3fa;
    --ink: #1f314d;
    --ink-soft: #40516b;
    --muted: #7b899c;
    --faint: #a3afbf;
    --line: rgba(170, 184, 205, .28);
    --glass: rgba(255,255,255,.58);
    --glass-strong: rgba(255,255,255,.74);
    --glass-soft: rgba(255,255,255,.38);
    --empty: rgba(211, 224, 240, .58);
    --blue: #1877ff;
    --blue2: #4ba0ff;
    --blue-soft: rgba(24,119,255,.16);
    --blue-mid: rgba(24,119,255,.34);
    --radius-xl: 24px;
    --radius-lg: 20px;
    --radius-md: 16px;
    --ease: cubic-bezier(.22,.9,.2,1);
    --spring: cubic-bezier(.18,.78,.28,1.06);
    --slide-ms: 140ms;
    --slide-delay: 32ms;
    --font: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    position: fixed;
    inset: 0;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  html { background: var(--bg0); }
  body {
    color: var(--ink);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    background:
      radial-gradient(circle at 16% 10%, rgba(255,255,255,.98) 0 18%, transparent 42%),
      radial-gradient(circle at 84% 4%, rgba(255,255,255,.90) 0 14%, transparent 36%),
      radial-gradient(circle at 68% 86%, rgba(203,225,255,.44) 0 13%, transparent 38%),
      linear-gradient(145deg, #f8fbff 0%, #eef3fa 48%, #f7faff 100%);
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: .42;
    background-image:
      linear-gradient(rgba(255,255,255,.45) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.35) 1px, transparent 1px);
    background-size: 34px 34px;
    mask-image: radial-gradient(circle at 50% 30%, black, transparent 72%);
  }

  button { font: inherit; color: inherit; }
  .screen {
    width: 100%;
    max-width: 540px;
    height: 100vh;
    height: 100dvh;
    margin: 0 auto;
    /* 좌우 padding 키움 — 카드 box-shadow가 안에서 잘리지 않도록 buffer 확보 */
    padding: max(env(safe-area-inset-top), 18px) clamp(20px, 5.5vw, 28px) max(env(safe-area-inset-bottom), 18px);
    display: none;
    position: relative;
  }
  .screen.active {
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    touch-action: pan-y;
    scrollbar-width: none;
  }
  .screen.active::-webkit-scrollbar { display: none; }
  /* 클릭 가능 요소 — pan-y가 적용된 .screen.active 내부에서도 빠른 탭이 즉각 click으로 발화되도록 보장.
     iOS Safari가 빠른 탭에서 click을 누락하는 케이스 방지 (특히 div + role=button 패턴). */
  button, [role="button"] { touch-action: manipulation; }

  .statusbar {
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    color: #05070b;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -.02em;
  }
  .status-icons { display: flex; gap: 5px; align-items: center; }
  .signal { display:flex; gap:2px; align-items:flex-end; height:12px; }
  .signal span { width:3px; border-radius:2px; background:#05070b; display:block; }
  .signal span:nth-child(1){height:4px}.signal span:nth-child(2){height:6px}.signal span:nth-child(3){height:9px}.signal span:nth-child(4){height:11px}
  .wifi { width: 14px; height: 10px; position: relative; overflow: hidden; }
  .wifi::before { content:""; position:absolute; left:1px; top:0; width:12px; height:12px; border:2px solid #05070b; border-color:#05070b transparent transparent transparent; border-radius:50%; transform: rotate(45deg); }
  .battery { width: 20px; height: 10px; border: 2px solid #05070b; border-radius: 3px; position:relative; }
  .battery::before { content:""; position:absolute; right:-4px; top:2px; width:2px; height:4px; background:#05070b; border-radius:1px; }
  .battery::after { content:""; position:absolute; left:2px; top:2px; width:12px; height:2px; background:#05070b; border-radius:2px; }

  .topbar {
    height: 54px;
    display: grid;
    grid-template-columns: 48px 1fr auto;
    align-items: center;
  }
  .topbar > .icon-btn:first-child  { justify-self: start; }
  .topbar-right { display: flex; gap: 4px; justify-self: end; align-items: center; }
  .debug-btn { color: var(--muted); }
  .debug-btn svg { opacity: .85; }
  /* 디버그 모달 — 게임 진행 중 강제 win 등 빠른 테스트용 */
  .debug-modal {
    position: fixed;
    inset: 0;
    background: rgba(31, 49, 77, .42);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 24px;
  }
  .debug-modal.active { display: flex; }
  .debug-card {
    background: linear-gradient(145deg, rgba(255,255,255,.94), rgba(255,255,255,.78));
    border: 1px solid rgba(255,255,255,.92);
    box-shadow: 0 24px 56px rgba(31,49,77,.18);
    border-radius: 20px;
    padding: 20px;
    min-width: 240px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .debug-card h3 {
    margin: 0 0 4px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: .12em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .debug-card button {
    border: 0;
    background: var(--blue);
    color: #fff;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .debug-card button:active { transform: scale(.97); }
  .debug-row { display: flex; gap: 8px; align-items: stretch; }
  .debug-row input {
    flex: 1;
    min-width: 0;
    border: 1px solid rgba(31,49,77,.18);
    border-radius: 12px;
    padding: 0 14px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    font-family: inherit;
    background: rgba(255,255,255,.6);
    outline: none;
    -moz-appearance: textfield;
  }
  .debug-row input::-webkit-outer-spin-button,
  .debug-row input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .debug-row input:focus { border-color: var(--blue); }
  .debug-row button { flex-shrink: 0; }
  .size-modal {
    position: fixed; inset: 0;
    background: rgba(31,49,77,.42);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; padding: 24px;
    visibility: hidden; opacity: 0; pointer-events: none;
    /* layer를 미리 유지해 첫 표시 시 backdrop-filter paint 비용 회피.
       opacity 페이드 후 visibility 토글로 화면에서 사라지게 함. */
    transition: opacity 120ms var(--ease), visibility 0s linear 120ms;
  }
  .size-modal.active {
    visibility: visible; opacity: 1; pointer-events: auto;
    transition: opacity 120ms var(--ease), visibility 0s;
  }
  .size-card {
    background: linear-gradient(145deg, rgba(255,255,255,.94), rgba(255,255,255,.78));
    border: 1px solid rgba(255,255,255,.92);
    box-shadow: 0 24px 56px rgba(31,49,77,.18);
    border-radius: 20px;
    padding: 20px;
    width: min(320px, 86vw);
    max-height: 80vh;
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .size-card h3 {
    margin: 0 0 12px;
    font-size: 12px; font-weight: 800; letter-spacing: .12em;
    color: var(--muted); text-transform: uppercase;
  }
  .size-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .size-option {
    aspect-ratio: 1;
    border: 1px solid rgba(31,49,77,.14);
    border-radius: 12px;
    background: linear-gradient(145deg, rgba(255,255,255,.74), rgba(255,255,255,.46));
    display: grid; place-items: center;
    font-size: 14px; font-weight: 800;
    color: var(--ink);
    cursor: pointer;
    font-family: inherit;
    letter-spacing: .02em;
    transition: transform 90ms var(--ease);
  }
  .size-option:active { transform: scale(.96); }
  .size-option.current {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
    box-shadow: 0 6px 16px rgba(24,119,255,.28);
  }
  /* 통계 화면 */
  #statsScreen .topbar { display: grid; grid-template-columns: 48px 1fr 48px; align-items: center; margin-bottom: clamp(14px, 4vw, 18px); }
  #statsScreen .center-title { font-size: clamp(17px, 5vw, 21px); }
  .stats-summary {
    display: grid; grid-template-columns: repeat(4, 1fr);
    border-radius: 18px;
    padding: clamp(14px, 4vw, 18px) clamp(6px, 2vw, 12px);
    margin-bottom: clamp(18px, 5vw, 24px);
  }
  .stats-summary-cell { display: flex; flex-direction: column; align-items: center; gap: 5px; position: relative; padding: 0 4px; }
  .stats-summary-cell svg { width: clamp(18px, 4.5vw, 22px); height: clamp(18px, 4.5vw, 22px); color: #94a4ba; margin-bottom: 2px; }
  .stats-summary-cell + .stats-summary-cell::before {
    content: ""; position: absolute; left: 0; top: 14%; bottom: 14%;
    width: 1px; background: var(--line);
  }
  .stats-summary-cell label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .04em; }
  .stats-summary-cell b { font-size: clamp(15px, 4.4vw, 19px); font-weight: 800; color: var(--ink); font-variant-numeric: tabular-nums; }
  .stats-section-title { margin: 0 0 10px; font-size: 12px; font-weight: 800; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; }
  #statsSizeList { display: flex; flex-direction: column; gap: 10px; }
  .stats-size-card {
    background: linear-gradient(145deg, rgba(255,255,255,.76), rgba(255,255,255,.42));
    border: 1px solid rgba(255,255,255,.72);
    box-shadow: 0 8px 20px rgba(35,55,90,.07);
    -webkit-backdrop-filter: blur(16px) saturate(150%);
    backdrop-filter: blur(16px) saturate(150%);
    border-radius: 16px;
    padding: 14px 16px;
    display: grid; grid-template-columns: 82px 1fr; gap: 14px; align-items: center;
  }
  .stats-size-label { font-size: clamp(18px, 5vw, 22px); font-weight: 800; color: var(--blue); font-variant-numeric: tabular-nums; letter-spacing: .02em; }
  .stats-size-rows { display: grid; grid-template-columns: auto 1fr; gap: 5px 14px; font-size: 13px; }
  .stats-size-rows .k { color: var(--muted); font-weight: 600; }
  .stats-size-rows .v { color: var(--ink); font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; }
  .stats-empty { color: var(--muted); font-size: 13px; padding: 14px; text-align: center; }
  .stats-footer { margin-top: clamp(24px, 6vw, 36px); margin-bottom: clamp(20px, 5vw, 32px); display: flex; flex-direction: column; gap: 14px; align-items: center; }
  .stats-note { font-size: 12px; color: var(--muted); margin: 0; text-align: center; }
  .stats-reset-btn {
    border: 1px solid rgba(196,42,42,.32);
    background: rgba(255,255,255,.6);
    color: #b32e2e;
    border-radius: 12px;
    padding: 12px 22px;
    font-size: 13px; font-weight: 700; font-family: inherit;
    cursor: pointer; letter-spacing: .02em;
  }
  .stats-reset-btn:active { transform: scale(.97); }
  .icon-btn {
    width: 44px; height: 44px; border: 0; background: transparent; border-radius: 16px;
    display: grid; place-items: center; color: var(--ink); cursor: pointer;
    transition: transform 100ms ease, background 160ms ease;
  }
  .icon-btn:active { transform: scale(.92); }
  .icon-btn:hover { background: rgba(255,255,255,.48); }
  .icon-btn svg { width: 23px; height: 23px; overflow: visible; }
  .center-title { justify-self:center; display:flex; gap: 7px; align-items:center; font-size: clamp(18px, 5.4vw, 23px); font-weight: 800; letter-spacing: .04em; }
  .center-title button { border: 0; background: transparent; padding: 0; display:flex; align-items:center; gap:7px; cursor:pointer; color: var(--ink); }
  .center-title .chev-down { width: 16px; height: 16px; opacity: .82; }
  /* 무한 모드: "무한모드" 텍스트만 표시, chevron 숨김. 클릭 비활성. */
  #sizeCycle.infinite-mode { cursor: default; pointer-events: none; }
  #sizeCycle.infinite-mode .chev-down { display: none; }

  .home-top {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-bottom: 20px;
  }
  .hero { text-align: center; margin: clamp(18px, 4vw, 36px) 0 clamp(22px, 5vw, 40px); }
  .hero h1 { margin: 0 0 10px; font-size: clamp(24px, 7vw, 34px); line-height: 1.12; letter-spacing: -.045em; font-weight: 850; }
  .hero p { margin: 0; color: var(--ink-soft); font-size: clamp(13px, 3.8vw, 17px); font-weight: 500; letter-spacing: -.025em; }

  .glass-card {
    background: linear-gradient(145deg, rgba(255,255,255,.76), rgba(255,255,255,.42));
    border: 1px solid rgba(255,255,255,.72);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.92),
      inset 0 -1px 0 rgba(195,208,226,.18),
      0 16px 36px rgba(35,55,90,.09);
    backdrop-filter: blur(22px) saturate(150%);
    -webkit-backdrop-filter: blur(22px) saturate(150%);
  }
  .difficulty-list {
    display: flex;
    flex-direction: column;
    gap: clamp(10px, 2.5vw, 16px);
    padding: 0 2px;
  }
  .difficulty-card {
    min-height: clamp(88px, 22vw, 120px);
    width: 100%;
    border: 0;
    border-radius: 18px;
    padding: 0 clamp(18px, 5.5vw, 26px) 0 clamp(22px, 7vw, 34px);
    cursor: pointer;
    display: grid;
    grid-template-columns: minmax(0, 1fr) clamp(48px, 14vw, 78px) clamp(16px, 5vw, 22px);
    column-gap: 10px;
    align-items: center;
    text-align: left;
    background:
      radial-gradient(circle at 16% 10%, rgba(255,255,255,.96), rgba(255,255,255,.55) 42%, rgba(255,255,255,.48) 100%),
      linear-gradient(145deg, rgba(255,255,255,.82), rgba(255,255,255,.50));
    border: 1px solid rgba(255,255,255,.82);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.98),
      inset 0 -1px 0 rgba(178,194,217,.12),
      0 18px 42px rgba(38,58,92,.075),
      0 3px 10px rgba(38,58,92,.035);
    backdrop-filter: blur(24px) saturate(155%);
    -webkit-backdrop-filter: blur(24px) saturate(155%);
    transition: transform 130ms ease, box-shadow 180ms ease, background 180ms ease;
  }
  .difficulty-card:active { transform: scale(.985); }
  .difficulty-card .label {
    font-size: clamp(17px, 5vw, 23px);
    line-height: 1;
    font-weight: 850;
    letter-spacing: .025em;
    margin-bottom: clamp(8px, 2.6vw, 13px);
    color: #10223d;
  }
  .difficulty-card .sub {
    font-size: clamp(11px, 3.3vw, 15px);
    line-height: 1;
    color: #7f8da2;
    font-weight: 650;
    letter-spacing: -.02em;
  }
  /* 데일리 카드 — 다른 카드와 사이즈/구조 동일하지만 블루 강조로 "특별" 시각 위계 */
  .daily-card {
    /* 일반 카드의 화이트 글라스 위에 블루 미세 tint + 블루 보더 + 블루 glow */
    background:
      radial-gradient(circle at 18% 14%, rgba(255,255,255,.96), rgba(255,255,255,.55) 42%, rgba(255,255,255,.48) 100%),
      linear-gradient(145deg, rgba(24,119,255,.10), rgba(75,160,255,.04));
    border-color: rgba(24,119,255,.30);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.98),
      inset 0 -1px 0 rgba(24,119,255,.10),
      0 18px 42px rgba(24,119,255,.18),
      0 3px 10px rgba(24,119,255,.10);
    /* cap + label + sub 3줄이라 다른 카드(2줄)보다 빡빡 — vertical padding 추가 + min-height 살짝 키워 모바일에서 호흡 확보 */
    padding-top: clamp(14px, 4vw, 18px);
    padding-bottom: clamp(14px, 4vw, 18px);
    min-height: clamp(100px, 26vw, 132px);
    /* 다음 카드(.difficulty-list)와 명확한 시각 분리 */
    margin-bottom: clamp(18px, 5vw, 26px);
  }
  .daily-card .label {
    color: var(--blue);
    letter-spacing: -.02em;
    /* cap이 위에 붙어있어서 label↔sub 사이 간격은 살짝 줄임 (균형) */
    margin-bottom: clamp(6px, 2vw, 10px);
  }
  .daily-card .sub { color: var(--ink-soft); }
  .daily-cap {
    display: inline-block;
    font-size: clamp(9px, 2.6vw, 10px);
    font-weight: 800;
    letter-spacing: .14em;
    color: var(--blue);
    background: rgba(24,119,255,.12);
    padding: 3px 8px;
    border-radius: 6px;
    margin-bottom: clamp(6px, 2vw, 8px);
  }
  /* 데일리 카드 썸네일 — 다른 카드의 .mini-grid와 동일 외곽 크기 (모바일에서도 적당히 작게) */
  .daily-thumb {
    width: clamp(42px, 12vw, 55px);
    height: clamp(42px, 12vw, 55px);
    border-radius: 12px;
    background: linear-gradient(180deg, #5ca8ff 0%, #1877ff 100%);
    display: grid;
    place-items: center;
    color: #fff;
    box-shadow: 0 6px 14px rgba(24,119,255,.32);
    justify-self: center;
  }
  .daily-thumb svg {
    width: 48%;
    height: 48%;
    stroke-width: 2;
  }
  .mini-grid {
    width: clamp(42px, 12vw, 55px);
    height: clamp(42px, 12vw, 55px);
    display: grid;
    gap: 4px;
    padding: 1px;
    justify-self: center;
    filter: drop-shadow(0 7px 12px rgba(60,92,140,.08));
  }
  .mini-grid.g3 { grid-template-columns: repeat(3, 1fr); }
  .mini-grid.g4 {
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
  }
  .mini-grid span {
    border-radius: 5px;
    background: linear-gradient(145deg, rgba(221,231,246,.82), rgba(198,216,239,.58));
    border: 1px solid rgba(255,255,255,.56);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.85),
      0 4px 9px rgba(77,104,144,.06);
  }
  .mini-grid span.hot {
    background: linear-gradient(180deg, #5ca8ff 0%, #1877ff 100%);
    border-color: rgba(255,255,255,.68);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.52),
      0 5px 12px rgba(24,119,255,.35),
      0 0 0 2px rgba(24,119,255,.08);
  }
  .chev {
    width: 22px;
    height: 22px;
    color: #7f8ea4;
    stroke-width: 2.35;
    justify-self: end;
  }
  .photo-thumb {
    width: clamp(42px, 12vw, 55px);
    height: clamp(42px, 12vw, 55px);
    display: grid;
    place-items: center;
    border-radius: 14px;
    justify-self: center;
    background: linear-gradient(180deg, #5ca8ff 0%, #1877ff 100%);
    border: 1px solid rgba(255,255,255,.68);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.52),
      0 8px 16px rgba(24,119,255,.34),
      0 0 0 2px rgba(24,119,255,.08);
    color: white;
    overflow: hidden;
    background-size: cover;
    background-position: center;
  }
  .photo-thumb svg { width: clamp(18px, 5.5vw, 24px); height: clamp(18px, 5.5vw, 24px); }
  .photo-thumb.has-image svg { display: none; }
  .infinity-thumb {
    width: clamp(42px, 12vw, 55px);
    height: clamp(42px, 12vw, 55px);
    display: grid;
    place-items: center;
    border-radius: 14px;
    justify-self: center;
    background: linear-gradient(180deg, #b69bff 0%, #6a45e7 100%);
    border: 1px solid rgba(255,255,255,.68);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.52),

  .infinity-thumb svg { width: clamp(24px, 8vw, 32px); height: clamp(16px, 5.4vw, 22px); }
  .home-stats { margin: clamp(20px, 6vw, 46px) 0 0; border: 0; padding: 0; font: inherit; color: inherit; text-align: inherit; border-radius: 20px; min-height: clamp(78px, 20vw, 104px); display:grid; grid-template-columns: repeat(3,1fr); overflow:hidden; cursor: pointer; transition: transform 100ms var(--ease); width: 100%; }

  .home-stat { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; position:relative; padding: 8px 6px; }

  .home-stat svg { width: clamp(18px, 4.5vw, 22px); height: clamp(18px, 4.5vw, 22px); color: #94a4ba; margin-bottom: 2px; }
  .home-stat .cap { font-size: clamp(11px, 3.2vw, 14px); color: #7f8fa5; font-weight: 600; }
  .home-stat .val { font-size: clamp(16px, 4.8vw, 20px); font-weight: 850; letter-spacing: -.02em; }

  .play-layout { flex: 1; display:flex; flex-direction:column; }
  .stats-row { margin: clamp(24px, 7vw, 42px) clamp(14px, 5vw, 26px) clamp(20px, 6vw, 32px); display:grid; grid-template-columns: 1fr 1px 1fr; align-items:center; }
  .divider { height: clamp(34px, 9vw, 46px); background: var(--line); }

  .stat.right { text-align:center; }

  .stat .num { font-size: clamp(16px, 5vw, 22px); font-weight: 850; font-variant-numeric: tabular-nums; letter-spacing: -.015em; }

  .board-wrap { width:100%; padding: 0 2px; }
  .board {
    width: 100%; aspect-ratio: 1/1; position: relative; border-radius: 14px;
    background: linear-gradient(145deg, rgba(235,242,251,.56), rgba(255,255,255,.34));
    border: 1px solid rgba(255,255,255,.78);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.9),
      inset 0 -1px 0 rgba(135,159,191,.18),
      0 18px 38px rgba(38,58,92,.10),
      0 2px 8px rgba(38,58,92,.05);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    overflow: hidden;
  }
  .board::after { content:""; position:absolute; inset:0; pointer-events:none; border-radius:inherit; box-shadow: inset 0 0 30px rgba(255,255,255,.30); }
  .tile {
    position: absolute; border: 0; padding: 0; border-radius: 10px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font); font-weight: 780; color: #34465f; font-variant-numeric: tabular-nums;
    background: linear-gradient(145deg, rgba(255,255,255,.70), rgba(255,255,255,.46));
    border: 1px solid rgba(255,255,255,.78);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.95),
      inset 0 -1px 0 rgba(164,184,209,.18),
      0 2px 5px rgba(35,55,86,.12),
      0 0 18px rgba(110,160,220,.16);
    backdrop-filter: blur(18px) saturate(150%);
    -webkit-backdrop-filter: blur(18px) saturate(150%);
    transition:
      transform var(--slide-ms) linear,
      background 260ms ease,
      box-shadow 260ms ease,
      color 260ms ease,
      opacity 200ms ease;
    will-change: transform;
    touch-action: none;
    overflow: hidden;
    isolation: isolate;
  }
  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(180deg, rgba(255,255,255,.45) 0%, rgba(255,255,255,.10) 32%, rgba(255,255,255,0) 58%);
    pointer-events: none;
    z-index: 0;
  }
  .tile .num {
    position: relative;
    z-index: 1;
  }
  .tile.img::before { display: none; }
  .tile:active { transform: var(--pos) scale(.965); transition-duration: 80ms; transition-delay: 0ms; }
  .tile.img {
    color: transparent;
    background-color: transparent;
    background-repeat: no-repeat;
  }
  .tile.img .img-num {
    position: absolute;
    top: 4px;
    right: 7px;
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,.85);
    text-shadow: 0 1px 2px rgba(0,0,0,.45);
    pointer-events: none;
  }
  .tile.hint {
    color: var(--blue);
    background: linear-gradient(145deg, rgba(230,242,255,.88), rgba(184,215,255,.48));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.96),
      0 0 0 1px rgba(24,119,255,.18),
      0 0 0 5px rgba(24,119,255,.10),

  .toolbar { margin-top: auto; padding: 48px 6px 8px; display:grid; grid-template-columns: repeat(3, 1fr); gap: 28px; align-items:end; }
  .tool-btn {
    justify-self:center; width:70px; min-height:70px; border:0; border-radius:15px; cursor:pointer; position:relative;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px;

    transition: transform 100ms ease, filter 160ms ease, opacity 160ms ease;
  }
  .tool-btn svg { width: 24px; height: 24px; }
  .tool-btn:active { transform: scale(.94); }
  .tool-btn:disabled { opacity: .38; cursor:default; }
  .badge { position:absolute; right:-5px; top:-7px; min-width:21px; height:21px; padding:0 6px; border-radius:999px; display:grid; place-items:center; background: var(--blue); color:white; font-size:12px; font-weight:850; box-shadow:0 6px 14px rgba(24,119,255,.30); }

  .win-head { text-align:center; padding: 56px 0 28px; position:relative; }
  .win-head h2 { margin:0 0 12px; color: var(--blue); font-size: clamp(22px, 7vw, 30px); font-weight:900; letter-spacing:-.02em; }
  .win-head p { margin:0; font-size: clamp(15px, 4.6vw, 20px); font-weight:850; color:#1f314d; }
  .win-head p span { color:#93a0b2; padding: 0 12px; }
  .win-actions { padding: 44px 2px 0; display:flex; flex-direction:column; gap:22px; }
  .primary-cta { height: clamp(50px, 14vw, 60px); border:0; border-radius: 12px; cursor:pointer; color:#fff; font-size: clamp(15px, 4.5vw, 18px); font-weight:800; background: linear-gradient(180deg, #2b91ff 0%, #1170f6 100%); box-shadow: 0 16px 28px rgba(24,119,255,.28), inset 0 1px 0 rgba(255,255,255,.34); }
  .secondary-cta {
    height: clamp(50px, 14vw, 60px); border: 1px solid rgba(255,255,255,.85); border-radius: 12px; cursor: pointer;
    color: var(--ink); font-size: clamp(15px, 4.5vw, 18px); font-weight: 800;
    background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.60));

    backdrop-filter: blur(20px) saturate(150%);

  }
  .link-btn { border:0; background:transparent; color:#718098; font-size:15px; font-weight:700; cursor:pointer; }
  .confetti { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .confetti i { position:absolute; width:7px; height:11px; border-radius:2px; background: var(--blue); opacity:.55; animation: fall 1.8s var(--ease) both; }
  @keyframes fall { from { transform: translateY(-20px) rotate(0deg); opacity:0; } 12% { opacity:.75; } to { transform: translateY(160px) rotate(230deg); opacity:0; } }

  .tool-btn.pop, .secondary-cta.pop { animation: soft-pop 360ms var(--ease) both; }
  @keyframes soft-pop { from { transform: scale(.965); } 55% { transform: scale(1.018); } to { transform: scale(1); } }

  .tile.spawn { animation: tile-spawn 460ms var(--ease) both; }
  @keyframes tile-spawn {
    from { opacity:0; transform: var(--pos) scale(.86); filter: blur(2px); }

    to   { opacity:1; transform: var(--pos) scale(1); }

  /* Hint pulse — slow blink */
  .tile.hint { animation: hint-pulse 1.4s ease-in-out infinite; }
  @keyframes hint-pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.55; }
  }

  .home-indicator { position: fixed; left:50%; bottom: max(7px, env(safe-area-inset-bottom)); width: 138px; height:5px; transform:translateX(-50%); border-radius: 999px; background: #111827; opacity:.32; pointer-events:none; }

  @media (prefers-reduced-motion: reduce) {

    .confetti i, .tool-btn.pop, .secondary-cta.pop, .tile.spawn, .tile.hint { animation: none !important; }
  }
</style>
</head>

<script>
(() => {
  'use strict';

  // Block iOS pinch-zoom (viewport meta alone is ignored by modern iOS Safari).
  ['gesturestart', 'gesturechange', 'gestureend'].forEach(t =>
    document.addEventListener(t, (e) => e.preventDefault(), { passive: false })
  );
  // Cut multi-touch at touchstart so pinch never starts (anywhere on the page)
  document.addEventListener('touchstart', (e) => {
    if (e.touches && e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', (e) => {
    if (e.touches && e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  // Block double-tap zoom on non-interactive areas only.
  // Skip when target is a button (tile / toolbar / card) so rapid taps still fire click events.
  let lastTouchEnd = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    const onButton = e.target && typeof e.target.closest === 'function' && e.target.closest('button');

    lastTouchEnd = now;

  const LS_KEY = 'sliding_puzzle_glass_v1';
  // size 단계별 타일 간격 — 큰 그리드는 좁혀서 빽빽함 완화
  function gapFor() {
    if (size <= 8) return 4;
    if (size <= 11) return 3;
    return 2;
  }

  let size = 3;
  let tiles = [];
  let order = new Map();
  let emptyPos = 0;
  let moves = 0;
  // 타이머: 단순 startTs → "누적된 진행 시간 + 마지막 재개 시점" 모델
  // visibilitychange(화면 가림)에 대응해 백그라운드에서 시간이 흐르지 않도록 pause/resume 지원
  let accumulatedMs = 0;
  let lastResumeTs = null;
  let timerHandle = null;
  let won = false;
  let lockInput = false;
  let history = [];
  let hints = 3;
  let imageMode = false;
  let currentImage = null;
  let infiniteMode = false;

  const $ = (id) => document.getElementById(id);
  const homeScreen = $('homeScreen');
  const playScreen = $('playScreen');
  const winScreen = $('winScreen');
  const statsScreen = $('statsScreen');
  const boardEl = $('board');
  const winBoardEl = $('winBoard');
  const timeEl = $('time');
  const movesEl = $('moves');
  const diffLabel = $('diffLabel');
  const undoBtn = $('undoBtn');
  const hintBtn = $('hintBtn');
  const hintBadge = $('hintBadge');

  function todayKey() { return new Date().toISOString().slice(0,10); }
  function yesterdayKey(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    d.setDate(d.getDate() - 1);
    return d.toISOString().slice(0,10);
  }
  // LS 스키마 v2 — v1 마이그레이션 자동 처리.
  // stats: 사이즈별 누적 (평균/완료율 계산), dailyLog: 일별 plays/clears 시계열(그래프용), streak: 연속 완료
  function defaultStore() {
    return {
      v: 2,
      lastSize: 3,
      best: {},
      stats: {},
      today: { date: todayKey(), plays: 0 },
      completed: 0,
      dailyLog: {},
      streak: { current: 0, longest: 0, lastClearDate: null }
    };
  }
  function loadLS() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return defaultStore();
      const obj = JSON.parse(raw);
      if (!obj || typeof obj !== 'object') return defaultStore();
      // v1 → v2 마이그레이션 (best/today/completed/lastSize는 유지, 신규 필드만 채움)
      if (obj.v === 1) {
        obj.v = 2;
        obj.stats = obj.stats || {};
        obj.dailyLog = obj.dailyLog || {};
        obj.streak = obj.streak || { current: 0, longest: 0, lastClearDate: null };
      }
      if (obj.v !== 2) return defaultStore();
      // 누락 필드 방어 (LS 변조/구버전 잔재 대응)
      if (!obj.best) obj.best = {};
      if (!obj.stats) obj.stats = {};
      if (!obj.dailyLog) obj.dailyLog = {};
      if (!obj.streak) obj.streak = { current: 0, longest: 0, lastClearDate: null };
      if (!obj.today || obj.today.date !== todayKey()) obj.today = { date: todayKey(), plays: 0 };
      return obj;
    } catch { return defaultStore(); }
  }
  function saveLS(s) { try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch {} }
  function mutateLS(fn) { const s = loadLS(); fn(s); saveLS(s); renderHomeStats(); }
  function bestKey() { return String(size); }
  // 사이즈별 stats 슬롯이 없으면 초기화
  function ensureStats(s, k) {
    if (!s.stats[k]) s.stats[k] = { attempts: 0, clears: 0, totalTimeMs: 0, totalMoves: 0, lastClearTs: null };
    return s.stats[k];
  }
  // 일별 dailyLog 슬롯이 없으면 초기화
  function ensureDaily(s, dateStr) {
    if (!s.dailyLog[dateStr]) s.dailyLog[dateStr] = { plays: 0, clears: 0 };
    return s.dailyLog[dateStr];
  }
  function setBestIfBetter(timeMs, moveCount) {
    if (imageMode) return false; // 사진 모드는 LS 미반영 (정책: 메모리 휘발)
    let isNew = false;
    const today = todayKey();
    mutateLS(s => {
      const k = bestKey();
      const prev = s.best[k];
      if (!prev || timeMs < prev.timeMs) { s.best[k] = { timeMs, moves: moveCount, date: today }; isNew = true; }
      // 사이즈별 누적 통계
      const st = ensureStats(s, k);
      st.clears = (st.clears || 0) + 1;
      st.totalTimeMs = (st.totalTimeMs || 0) + timeMs;
      st.totalMoves = (st.totalMoves || 0) + moveCount;
      st.lastClearTs = Date.now();
      // 일별 clears
      ensureDaily(s, today).clears += 1;
      // streak — 마지막 클리어 날짜와 비교
      if (!s.streak) s.streak = { current: 0, longest: 0, lastClearDate: null };
      if (s.streak.lastClearDate === today) {
        // 오늘 이미 클리어한 적 있음 — current 유지
      } else if (s.streak.lastClearDate === yesterdayKey(today)) {
        s.streak.current = (s.streak.current || 0) + 1;
      } else {
        s.streak.current = 1;
      }
      s.streak.longest = Math.max(s.streak.longest || 0, s.streak.current);
      s.streak.lastClearDate = today;
      s.completed = (s.completed || 0) + 1;
      s.lastSize = size;
    });
    return isNew;
  }
  function rememberSize() { mutateLS(s => { s.lastSize = size; }); }
  // 셔플 시작 시 호출 — today.plays + dailyLog.plays + stats[size].attempts 모두 증가
  function countPlay() {
    if (imageMode) return; // 사진 모드는 LS 미반영 (정책: 메모리 휘발)
    const today = todayKey();
    mutateLS(s => {
      s.today.plays = (s.today.plays || 0) + 1;
      ensureDaily(s, today).plays += 1;
      const st = ensureStats(s, bestKey());
      st.attempts = (st.attempts || 0) + 1;
    });
  }

  function fmtTime(ms) {
    const sec = Math.floor(ms / 1000);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }
  function renderHomeStats() {
    const s = loadLS();
    $('todayCount').textContent = String(s.today?.plays || 0);
    $('completeCount').textContent = String(s.completed || 0);
    const best = s.best?.[String(s.lastSize || size)] || s.best?.[String(size)];
    $('bestTime').textContent = best ? fmtTime(best.timeMs) : '--:--';
  }
  // 통계 페이지 렌더링 — LS 전체를 읽어 요약 + 사이즈별 카드 그리기
  function renderStats() {
    const s = loadLS();
    // 요약
    $('statTotalClears').textContent = String(s.completed || 0);
    const sizeKeys = Object.keys(s.best || {}).map(Number).filter(n => Number.isFinite(n) && n >= 3);
    const maxSize = sizeKeys.length ? Math.max(...sizeKeys) : 0;
    $('statMaxSize').textContent = maxSize ? `${maxSize}×${maxSize}` : '—';
    $('statToday').textContent = String(s.today?.plays || 0);
    const cur = s.streak?.current || 0;
    const lon = s.streak?.longest || 0;
    $('statStreak').textContent = lon > cur ? `${cur}일 (최장 ${lon})` : `${cur}일`;
    // 사이즈별 카드 — best 또는 stats에 한 번이라도 등장한 모든 사이즈를 합쳐서 정렬
    const allKeys = new Set([
      ...Object.keys(s.best || {}),
      ...Object.keys(s.stats || {}),
    ].map(Number).filter(n => Number.isFinite(n) && n >= 3));
    const sorted = [...allKeys].sort((a, b) => a - b);
    const listEl = $('statsSizeList');
    listEl.innerHTML = '';
    if (!sorted.length) {
      const empty = document.createElement('div');
      empty.className = 'stats-empty';
      empty.textContent = '아직 기록이 없어요. 한 판 풀어보세요!';
      listEl.appendChild(empty);
      return;
    }
    for (const n of sorted) {
      const k = String(n);
      const best = s.best?.[k];
      const st = s.stats?.[k] || { attempts: 0, clears: 0, totalTimeMs: 0, totalMoves: 0 };
      const avgTime = st.clears ? Math.round(st.totalTimeMs / st.clears) : null;
      const avgMoves = st.clears ? Math.round(st.totalMoves / st.clears) : null;
      const card = document.createElement('div');
      card.className = 'stats-size-card';
      const label = document.createElement('div');
      label.className = 'stats-size-label';
      label.textContent = `${n}×${n}`;
      const rows = document.createElement('div');
      rows.className = 'stats-size-rows';
      const lines = [
        ['최단', best ? `${fmtTime(best.timeMs)} · ${best.moves}수` : '—'],
        ['평균', avgTime !== null ? `${fmtTime(avgTime)} · ${avgMoves}수` : '—'],
        ['완료', `${st.clears || 0} / ${st.attempts || 0}`],
      ];
      for (const [kk, vv] of lines) {
        const ke = document.createElement('span'); ke.className = 'k'; ke.textContent = kk;
        const ve = document.createElement('span'); ve.className = 'v'; ve.textContent = vv;
        rows.appendChild(ke); rows.appendChild(ve);
      }
      card.appendChild(label); card.appendChild(rows);
      listEl.appendChild(card);
    }
  }
  function openStats() { renderStats(); show(statsScreen); }
  function resetStats() {
    if (!confirm('모든 통계 기록을 초기화합니다. 되돌릴 수 없어요. 계속할까요?')) return;
    saveLS(defaultStore());
    renderHomeStats();
    renderStats();
  }

  function show(screen) {
    [homeScreen, playScreen, winScreen, statsScreen].forEach(el => el.classList.remove('active'));
    screen.classList.add('active');
    requestAnimationFrame(() => {
      sizeFonts();
      layout(false);
      if (screen === winScreen) layoutSolved(winBoardEl);
    });
  }
  function updateDiffLabel() {
    diffLabel.textContent = infiniteMode ? '무한모드' : `${size} × ${size}`;
    // 무한 모드는 chevron 숨김 + 클릭 비활성
    $('sizeCycle').classList.toggle('infinite-mode', infiniteMode);
  }
  function posToRC(pos) { return { row: Math.floor(pos / size), col: pos % size }; }
  function rcToPos(row, col) { return row * size + col; }
  function tileSize(board = boardEl) { const GAP = gapFor(); const boardPx = board.clientWidth; return (boardPx - GAP * (size + 1)) / size; }
  function tilePos(row, col, board = boardEl) { const GAP = gapFor(); const ts = tileSize(board); return { x: GAP + col * (ts + GAP), y: GAP + row * (ts + GAP), ts }; }

  function buildTiles(target = boardEl, solved = false) {
    target.innerHTML = '';
    if (!solved) { tiles = []; order = new Map(); history = []; won = false; updateUndo(); }
    const N = size * size;
    for (let i = 0; i < N - 1; i++) {
      const val = i + 1;
      const row = Math.floor(i / size);
      const col = i % size;
      if (!solved) { tiles[i] = val; order.set(val, { row, col }); }
      const el = document.createElement('button');
      el.className = 'tile';
      el.dataset.value = String(val);
      el.setAttribute('aria-label', `타일 ${val}`);
      if (imageMode && currentImage) {
        el.classList.add('img');
        el.style.backgroundImage = `url("${currentImage}")`;
        const numEl = document.createElement('span');
        numEl.className = 'img-num';
        numEl.textContent = String(val);
        el.appendChild(numEl);
      } else {
        const numEl = document.createElement('span');
        numEl.className = 'num';
        numEl.textContent = String(val);
        el.appendChild(numEl);
      }
      if (!solved) el.addEventListener('click', () => tryTapTile(val));
      target.appendChild(el);
    }
    if (!solved) { tiles[N - 1] = 0; emptyPos = N - 1; layout(false); sizeFonts(); }
    else layoutSolved(target);
  }
  function sizeFonts() {
    // size 단계별 폰트(비율/최소값/굵기) + 타일 라운드 + 보드 라운드 조정
    let ratio, minFs, weight, tileR, boardR;
    if (size <= 6)       { ratio = 0.36; minFs = 24; weight = 780; tileR = 10; boardR = 14; }
    else if (size <= 8)  { ratio = 0.30; minFs = 17; weight = 720; tileR = 8;  boardR = 12; }
    else if (size <= 11) { ratio = 0.26; minFs = 14; weight = 720; tileR = 6;  boardR = 8;  }
    else if (size <= 14) { ratio = 0.22; minFs = 12; weight = 680; tileR = 5;  boardR = 6;  }
    else if (size <= 16) { ratio = 0.18; minFs = 10; weight = 640; tileR = 5;  boardR = 6;  }
    else if (size === 17){ ratio = 0.15; minFs = 9;  weight = 620; tileR = 5;  boardR = 6;  }
    else if (size === 18){ ratio = 0.14; minFs = 9;  weight = 600; tileR = 4;  boardR = 5;  }
    else if (size === 19){ ratio = 0.13; minFs = 8;  weight = 580; tileR = 3;  boardR = 4;  }
    else                 { ratio = 0.12; minFs = 8;  weight = 560; tileR = 2;  boardR = 3;  }
    [boardEl, winBoardEl].forEach(board => {
      if (!board || !board.clientWidth) return;
      board.style.borderRadius = `${boardR}px`;
      const ts = tileSize(board);
      const fs = Math.max(minFs, ts * ratio);
      board.querySelectorAll('.tile').forEach(el => {
        el.style.fontSize = `${fs}px`;
        el.style.fontWeight = weight;
        el.style.borderRadius = `${tileR}px`;
      });
    });
  }
  function applyImageBg(el, board, val) {
    if (!(imageMode && currentImage)) return;
    const GAP = gapFor();
    const ts = tileSize(board);
    const boardW = board.clientWidth;
    const targetRow = Math.floor((val - 1) / size);
    const targetCol = (val - 1) % size;
    const x = GAP + targetCol * (ts + GAP);
    const y = GAP + targetRow * (ts + GAP);
    el.style.backgroundSize = `${boardW}px ${boardW}px`;
    el.style.backgroundPosition = `-${x}px -${y}px`;
  }
  function layout(animate = true) {
    if (!boardEl.clientWidth) return;
    const ts = tileSize(boardEl);
    for (const val of order.keys()) {
      const rc = order.get(val);
      const { x, y } = tilePos(rc.row, rc.col, boardEl);
      const el = boardEl.querySelector(`.tile[data-value="${val}"]`);
      if (!el) continue;
      el.style.width = `${ts}px`;
      el.style.height = `${ts}px`;
      el.style.setProperty('--pos', `translate(${x}px, ${y}px)`);
      el.style.transform = `translate(${x}px, ${y}px)`;
      applyImageBg(el, boardEl, val);
    }
    if (!animate) disableTransitionsOnce(boardEl);
  }
  function layoutSolved(target) {
    if (!target.clientWidth) return;
    const ts = tileSize(target);
    target.querySelectorAll('.tile').forEach(el => {
      const val = Number(el.dataset.value);
      const pos = val - 1;
      const { row, col } = posToRC(pos);
      const { x, y } = tilePos(row, col, target);
      el.style.width = `${ts}px`;
      el.style.height = `${ts}px`;
      el.style.setProperty('--pos', `translate(${x}px, ${y}px)`);
      el.style.transform = `translate(${x}px, ${y}px)`;
      el.classList.add('complete');
      applyImageBg(el, target, val);
    });
    disableTransitionsOnce(target);
  }
  function disableTransitionsOnce(root) {
    root.querySelectorAll('.tile').forEach(el => { el.style.transition = 'none'; el.offsetHeight; el.style.transition = ''; });
  }

  function neighborsOf(pos) {
    const { row, col } = posToRC(pos);
    const out = [];
    if (row > 0) out.push(rcToPos(row - 1, col));
    if (row < size - 1) out.push(rcToPos(row + 1, col));
    if (col > 0) out.push(rcToPos(row, col - 1));
    if (col < size - 1) out.push(rcToPos(row, col + 1));
    return out;
  }
  function isAdjacentToEmpty(pos) { return neighborsOf(emptyPos).includes(pos); }
  function findPosOfValue(val) { return tiles.indexOf(val); }
  function applyMove(tilePos_) {
    const val = tiles[tilePos_];
    tiles[emptyPos] = val;
    tiles[tilePos_] = 0;
    const newRC = posToRC(emptyPos);
    emptyPos = tilePos_;
    order.set(val, newRC);
  }
  function tryTapTile(val) {
    if (lockInput || won) return;
    const pos = findPosOfValue(val);
    if (!isAdjacentToEmpty(pos)) return;
    doMove(pos, true);
  }
  function doMove(pos, pushHistory) {
    const wasEmpty = emptyPos;
    applyMove(pos);
    if (pushHistory) { history.push({ tileTo: wasEmpty, emptyTo: pos }); updateUndo(); }
    if (lastResumeTs === null && accumulatedMs === 0) startTimer();
    moves++;
    movesEl.textContent = moves;
    layout(true);
    clearHints();
    if (isSolved()) onSolved();
  }
  function tryMoveByDirection(dir) {
    if (lockInput || won) return;
    const { row, col } = posToRC(emptyPos);
    let target = -1;
    if (dir === 'up' && row < size - 1) target = rcToPos(row + 1, col);
    if (dir === 'down' && row > 0) target = rcToPos(row - 1, col);
    if (dir === 'left' && col < size - 1) target = rcToPos(row, col + 1);
    if (dir === 'right' && col > 0) target = rcToPos(row, col - 1);
    if (target >= 0) doMove(target, true);
  }
  function undo() {
    if (lockInput || won || !history.length) return;
    const last = history.pop();
    applyMove(last.tileTo);
    moves = Math.max(0, moves - 1);
    movesEl.textContent = moves;
    layout(true);
    updateUndo();
  }
  function updateUndo() { undoBtn.disabled = history.length === 0 || won; }
  function isSolved() {
    const N = size * size;
    for (let i = 0; i < N - 1; i++) if (tiles[i] !== i + 1) return false;
    return true;
  }

  async function shuffle(startPlay = true) {
    lockInput = true;
    stopTimer();
    buildTiles();
    moves = 0; movesEl.textContent = '0';
    accumulatedMs = 0; lastResumeTs = null; timeEl.textContent = '00:00';
    won = false; hints = 3; hintBadge.textContent = hints; clearHints();
    const steps = Math.max(70, size * size * 10);
    let prevPos = -1;
    for (let i = 0; i < steps; i++) {
      const neigh = neighborsOf(emptyPos).filter(p => p !== prevPos);
      const pick = neigh[Math.floor(Math.random() * neigh.length)];
      prevPos = emptyPos;
      applyMove(pick);
    }
    if (isSolved()) applyMove(neighborsOf(emptyPos)[0]);
    layout(false); history = []; updateUndo();
    spawnTiles();
    if (startPlay) countPlay();
    await sleep(60);
    lockInput = false;
  }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  function startTimer() {
    accumulatedMs = 0;
    lastResumeTs = performance.now();
    timerHandle = setInterval(tickTimer, 200);
  }
  function stopTimer() {
    // 누적 시간 확정 후 interval 정지 (라운드 종료 시 호출)
    if (lastResumeTs !== null) {
      accumulatedMs += performance.now() - lastResumeTs;
      lastResumeTs = null;
    }
    if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
  }
  function tickTimer() { timeEl.textContent = fmtTime(elapsedMs()); }
  function elapsedMs() {
    return accumulatedMs + (lastResumeTs === null ? 0 : performance.now() - lastResumeTs);
  }
  // 화면 가시성 변화에 따라 타이머 pause/resume — 백그라운드에서 시간이 부풀어 베스트 기록이 깨지는 문제 방지
  function pauseTimer() {
    if (lastResumeTs !== null) {
      accumulatedMs += performance.now() - lastResumeTs;
      lastResumeTs = null;
    }
  }
  function resumeTimer() {
    // 게임 진행 중(미완료 + Play 화면 활성 + 이전에 시작한 적 있음)에만 재개
    if (lastResumeTs === null && !won && playScreen.classList.contains('active') && (accumulatedMs > 0 || timerHandle !== null)) {
      lastResumeTs = performance.now();
    }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) pauseTimer();
    else resumeTimer();
  });

  function clearHints() { boardEl.querySelectorAll('.tile.hint').forEach(el => el.classList.remove('hint')); }
  function showHint() {
    if (lockInput || won || hints <= 0) return;
    // 이미 hint 표시 중(아직 다음 이동 안 함)이면 재클릭은 무효 — 같은 결과 다시 보여주는데 카운트 차감 방지
    if (boardEl.querySelector('.tile.hint')) return;
    const candidates = neighborsOf(emptyPos).map(p => ({ p, val: tiles[p] })).filter(x => x.val > 0);
    if (!candidates.length) return;
    candidates.sort((a, b) => manhattanAfterMove(a.p) - manhattanAfterMove(b.p));
    const val = candidates[0].val;
    const el = boardEl.querySelector(`.tile[data-value="${val}"]`);
    if (el) el.classList.add('hint');
    hints--; hintBadge.textContent = hints;
  }
  function manhattanAfterMove(pos) {
    const copy = tiles.slice();
    copy[emptyPos] = copy[pos]; copy[pos] = 0;
    let sum = 0;
    for (let i = 0; i < copy.length; i++) {
      const val = copy[i]; if (!val) continue;
      const goal = val - 1;
      const a = posToRC(i), b = posToRC(goal);
      sum += Math.abs(a.row - b.row) + Math.abs(a.col - b.col);
    }
    return sum;
  }

  function pulse(el, cls = 'pop') {
    if (!el) return;
    el.classList.remove(cls);
    void el.offsetWidth;
    el.classList.add(cls);
  }
  function spawnTiles() {
    boardEl.querySelectorAll('.tile').forEach((el, i) => {
      el.classList.remove('spawn');
      const delay = Math.min(i * 10, 100);
      el.style.animationDelay = `${delay}ms`;
      void el.offsetWidth;
      el.classList.add('spawn');
      // Remove .spawn after animation finishes so its fill-mode doesn't lock the
      // transform value (which would block subsequent CSS transitions on user moves).
      setTimeout(() => {
        el.classList.remove('spawn');
        el.style.animationDelay = '';
      }, 460 + delay + 40);
    });
  }
  function configureWinActions() {
    const again = $('againBtn');
    const retry = $('retryBtn');
    const home = $('homeBtn');
    if (infiniteMode) {
      again.textContent = `다음 (${size + 1} × ${size + 1})`;
      retry.style.display = '';
      home.textContent = '홈';
    } else {
      again.textContent = '다시 플레이';
      retry.style.display = 'none';
      home.textContent = '메인으로';
    }
  }
  function alignWinBoardToPlay() {
    if (!boardEl.clientWidth) return;
    const playBoardTop = boardEl.getBoundingClientRect().top;
    const winScreenEl = $('winScreen');
    const screenPadTop = parseFloat(getComputedStyle(winScreenEl).paddingTop) || 0;
    const winHead = winScreenEl.querySelector('.win-head');
    if (!winHead) return;
    const headHeight = Math.max(0, playBoardTop - screenPadTop);
    winHead.style.height = `${headHeight}px`;
    winHead.style.padding = '0';
    winHead.style.display = 'flex';
    winHead.style.flexDirection = 'column';
    winHead.style.alignItems = 'center';
    winHead.style.justifyContent = 'center';
  }
  function onSolved() {
    won = true; lockInput = true; updateUndo(); stopTimer();
    const total = Math.round(elapsedMs());
    timeEl.textContent = fmtTime(total);
    setBestIfBetter(total, moves);
    boardEl.querySelectorAll('.tile').forEach(el => el.classList.add('complete'));
    $('winTime').textContent = fmtTime(total);
    $('winMoves').textContent = `${moves} 이동`;
    configureWinActions();
    alignWinBoardToPlay();
    setTimeout(() => {
      buildTiles(winBoardEl, true);
      sizeFonts(); layoutSolved(winBoardEl);
      makeConfetti();
      show(winScreen);

      // Image mode reveal: place the full photo on the board, then fade tiles out
      // so the 9 slices vanish and a seamless picture remains.
      if (imageMode && currentImage) {
        winBoardEl.style.backgroundImage = `url("${currentImage}")`;
        winBoardEl.style.backgroundSize = 'cover';
        winBoardEl.style.backgroundPosition = 'center';
        requestAnimationFrame(() => requestAnimationFrame(() => {
          winBoardEl.querySelectorAll('.tile').forEach(tile => {
            tile.style.transition = 'opacity 700ms ease-out 250ms';
            tile.style.opacity = '0';
          });
        }));
      } else {
        winBoardEl.style.backgroundImage = '';
        winBoardEl.style.backgroundSize = '';
        winBoardEl.style.backgroundPosition = '';
      }

      lockInput = false;
    }, 300);
  }
  function makeConfetti() {
    const c = $('confetti'); c.innerHTML = '';
    for (let i = 0; i < 28; i++) {
      const n = document.createElement('i');
      n.style.left = `${8 + Math.random() * 84}%`;
      n.style.top = `${-10 + Math.random() * 20}px`;
      n.style.animationDelay = `${Math.random() * .55}s`;
      n.style.transform = `rotate(${Math.random()*180}deg)`;
      n.style.background = Math.random() > .45 ? '#1877ff' : '#8bbdff';
      c.appendChild(n);
    }
  }

  function startGame(newSize = size) {
    size = newSize;
    rememberSize();
    updateDiffLabel();
    show(playScreen);
    shuffle(true);
  }
  document.querySelectorAll('.difficulty-card[data-size]').forEach(btn => btn.addEventListener('click', () => {
    imageMode = false;
    currentImage = null;
    infiniteMode = false;
    startGame(Number(btn.dataset.size));
  }));
  $('infiniteCard').addEventListener('click', () => {
    imageMode = false;
    currentImage = null;
    infiniteMode = true;
    startGame(3);
  });
  $('photoCard').addEventListener('click', () => $('photoInput').click());
  function cropToSquare(srcDataUrl, cb) {
    const img = new Image();
    img.onload = () => {
      const side = Math.min(img.width, img.height);
      const sx = (img.width - side) / 2;
      const sy = (img.height - side) / 2;
      const outSide = Math.min(side, 1024);
      const canvas = document.createElement('canvas');
      canvas.width = outSide;
      canvas.height = outSide;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, outSide, outSide);
      ctx.drawImage(img, sx, sy, side, side, 0, 0, outSide, outSide);
      cb(canvas.toDataURL('image/jpeg', 0.92));
    };
    img.onerror = () => cb(null);
    img.src = srcDataUrl;
  }
  $('photoInput').addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      cropToSquare(ev.target.result, (squared) => {
        if (!squared) { alert('이미지를 불러올 수 없습니다.'); return; }
        currentImage = squared;
        imageMode = true;
        const thumb = $('photoThumb');
        if (thumb) {
          thumb.classList.add('has-image');
          thumb.style.backgroundImage = `url("${currentImage}")`;
        }
        startGame(size);
      });
    };
    reader.onerror = () => {
      currentImage = null;
      imageMode = false;
      alert('이미지를 불러올 수 없습니다.');
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  });
  function goHome() {
    infiniteMode = false;
    stopTimer();
    show(homeScreen);
    renderHomeStats();
  }
  $('backBtn').addEventListener('click', goHome);

  // iOS-style edge swipe from left to right → back to home (per-screen onBack)
  function attachEdgeSwipeBack(el, onBack) {
    let s = null;
    el.addEventListener('pointerdown', (e) => {
      if (e.pointerType !== 'touch') return;
      if (e.clientX < 28) s = { x: e.clientX, y: e.clientY, t: Date.now() };
    });
    el.addEventListener('pointerup', (e) => {
      if (e.pointerType !== 'touch' || !s) return;
      const dx = e.clientX - s.x;
      const dy = Math.abs(e.clientY - s.y);
      const dt = Date.now() - s.t;
      s = null;
      if (dx > 80 && dy < 60 && dt < 800) onBack();
    });
    el.addEventListener('pointercancel', () => { s = null; });
  }
  attachEdgeSwipeBack(playScreen, () => {
    // 첫 이동 이후(타이머 시작됨)는 실수로 진행을 잃지 않도록 스와이프 차단. 뒤로 버튼은 그대로 동작
    if ((lastResumeTs !== null || accumulatedMs > 0) && !won) return;
    goHome();
  });
  attachEdgeSwipeBack(statsScreen, () => { show(homeScreen); renderHomeStats(); });
  $('newGame').addEventListener('click', () => shuffle(true));
  $('shuffleBtn').addEventListener('click', () => { pulse($('shuffleBtn')); shuffle(true); });
  undoBtn.addEventListener('click', () => { pulse(undoBtn); undo(); });
  hintBtn.addEventListener('click', () => { pulse(hintBtn); showHint(); });
  // 디버그 모달 — 빠른 win 등 테스트 (production에서도 유지, 사용자 명시 추가)
  const debugModal = $('debugModal');
  $('debugBtn').addEventListener('click', () => { debugModal.classList.add('active'); });
  debugModal.addEventListener('click', (e) => { if (e.target === debugModal) debugModal.classList.remove('active'); });
  $('debugWinBtn').addEventListener('click', () => {
    debugModal.classList.remove('active');
    if (!won && playScreen.classList.contains('active')) onSolved();
  });
  // 디버그 next — input 사이즈로 무한 모드 시작 (예: 10 입력 → 10×10)
  function debugGotoSize() {
    const inputEl = $('debugSizeInput');
    const n = parseInt(inputEl.value, 10);
    if (!Number.isFinite(n) || n < 3 || n > 15) return;
    debugModal.classList.remove('active');
    imageMode = false; currentImage = null; infiniteMode = true;
    startGame(n);
    inputEl.value = '';
  }
  $('debugNextBtn').addEventListener('click', debugGotoSize);
  $('debugSizeInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') debugGotoSize(); });
  $('againBtn').addEventListener('click', () => {
    if (infiniteMode) {
      size = size + 1;
      rememberSize();
      updateDiffLabel();
      show(playScreen);
      shuffle(true);
    } else {
      show(playScreen);
      shuffle(true);
    }
  });
  $('retryBtn').addEventListener('click', () => { pulse($('retryBtn')); show(playScreen); shuffle(true); });
  $('homeBtn').addEventListener('click', () => { infiniteMode = false; show(homeScreen); renderHomeStats(); });
  $('sizeCycle').addEventListener('click', () => {
    if (infiniteMode) return;
    openSizeModal();
  });
  // 사이즈 선택 모달 — 디폴트 3·4·5 + 무한 모드(또는 일반)에서 N×N 클리어 시 N+1 해금
  const sizeModal = $('sizeModal');
  const sizeGrid = $('sizeGrid');
  function computeSizeOptions() {
    const s = loadLS();
    const bestKeys = Object.keys(s.best || {}).map(Number).filter(n => Number.isFinite(n) && n >= 3);
    const maxBest = bestKeys.length ? Math.max(...bestKeys) : 0;
    const top = Math.max(5, maxBest + 1); // 디폴트 5 + 클리어 사이즈의 다음 해금
    const options = [];
    for (let n = 3; n <= top; n++) options.push(n);
    return options;
  }
  function renderSizeGrid() {
    sizeGrid.innerHTML = '';
    for (const n of computeSizeOptions()) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'size-option' + (n === size ? ' current' : '');
      btn.textContent = `${n} × ${n}`;
      btn.addEventListener('click', () => pickSize(n));
      sizeGrid.appendChild(btn);
    }
  }
  function openSizeModal() { renderSizeGrid(); sizeModal.classList.add('active'); }
  function pickSize(n) {
    sizeModal.classList.remove('active');
    imageMode = false; currentImage = null; infiniteMode = false;
    // 모달 닫기 paint를 한 프레임 보장 후 무거운 작업(빌드+셔플) 시작 → 닫기 응답 즉각
    if (n === size) { requestAnimationFrame(() => shuffle(true)); return; }
    requestAnimationFrame(() => startGame(n));
  }
  sizeModal.addEventListener('click', (e) => { if (e.target === sizeModal) sizeModal.classList.remove('active'); });
  $('settingsBtn').addEventListener('click', () => alert('설정은 다음 버전에서 연결하면 됩니다.'));
  // 데일리 챌린지 진입 placeholder (동작은 후속)
  $('dailyCard').addEventListener('click', () => alert('데일리 챌린지 — 곧 추가 예정'));
  // 통계 진입 — 홈 하단 home-stats 카드 클릭 (native button이라 키보드 Enter/Space 자동 처리)
  $('homeStatsCard').addEventListener('click', openStats);
  $('statsBackBtn').addEventListener('click', () => { show(homeScreen); renderHomeStats(); });
  $('statsResetBtn').addEventListener('click', resetStats);

  document.addEventListener('keydown', (e) => {
    if (!playScreen.classList.contains('active')) return;
    const map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
    if (map[e.key]) { e.preventDefault(); tryMoveByDirection(map[e.key]); }
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); }
  });
  let touchStart = null;
  boardEl.addEventListener('pointerdown', (e) => { if (e.pointerType === 'touch') touchStart = { x: e.clientX, y: e.clientY }; });
  boardEl.addEventListener('pointerup', (e) => {
    if (e.pointerType !== 'touch' || !touchStart) return;
    const dx = e.clientX - touchStart.x, dy = e.clientY - touchStart.y;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) >= 24) tryMoveByDirection(ax > ay ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
    touchStart = null;
  });
  let resizeRaf = null;
  window.addEventListener('resize', () => {
    if (resizeRaf) cancelAnimationFrame(resizeRaf);
    resizeRaf = requestAnimationFrame(() => { sizeFonts(); layout(false); layoutSolved(winBoardEl); });
  });
  function init() {
    const s = loadLS();
    size = (Number.isFinite(s.lastSize) && s.lastSize >= 3) ? s.lastSize : 3;
    updateDiffLabel();
    renderHomeStats();
  }
  window.addEventListener('load', init);
})();
</script>
</body>
</html>
